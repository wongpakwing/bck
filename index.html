<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 對抗佈局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        
        #special-zone { height: 200px; shrink: 0; }
        #regular-zone { flex: 1; min-height: 0; }

        .btn-touch:active { transform: scale(0.92); }
        
        /* 對抗進度條 */
        .duel-track {
            position: relative;
            height: 24px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #1e293b;
        }
        
        .progress-left {
            position: absolute;
            left: 0;
            height: 100%;
            background: #ef4444; /* 紅色 - 學霸 */
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-right {
            position: absolute;
            right: 0;
            height: 100%;
            background: #3b82f6; /* 藍色 - 壞蛋 */
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .duel-pulse {
            animation: pulse-bg 2s infinite;
        }
        @keyframes pulse-bg {
            0% { background-color: #1e293b; }
            50% { background-color: #450a0a; }
            100% { background-color: #1e293b; }
        }

        .member-info {
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .vs-badge {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            background: white;
            color: #1e293b;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            border: 2px solid #1e293b;
        }

        /* 確保彩色紙碎在最上層 */
        canvas#confetti-canvas {
            z-index: 999 !important;
            position: fixed !important;
        }

        .runner-emoji {
            z-index: 20;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
            pointer-events: none;
            transition: left 0.4s ease-out;
        }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden px-2 pt-2 h-screen flex flex-col text-slate-800">

    <!-- 頁首 -->
    <header class="bg-white/95 backdrop-blur rounded-t-xl px-4 py-2 flex justify-between items-center border-b border-slate-300 shadow-sm shrink-0">
        <div>
            <h1 class="font-bold text-xs">課室計分榜 <span id="modeText" class="text-blue-600">(勢力對峙)</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">常規全體 +1</button>
            <button onclick="resetAll()" class="bg-slate-400 text-white px-3 py-1 rounded-lg text-[10px]">全部重置</button>
        </div>
    </header>

    <!-- 特種競賽區 -->
    <div id="special-zone" class="p-3 bg-slate-900 border-x border-slate-300 flex flex-col justify-center">
        <!-- JS Render -->
    </div>

    <!-- 常規區 -->
    <div id="regular-zone" class="bg-slate-100 p-2 border-x border-slate-300 flex flex-col gap-2 no-scrollbar overflow-hidden">
        <!-- JS Render -->
    </div>

    <!-- 底部控制台 (按鈕放至最底) -->
    <footer class="bg-slate-900 rounded-b-xl p-2 flex flex-col gap-2 shrink-0 pb-3">
        <div class="flex gap-2">
            <!-- 左側：功能區 (擲骰與計時) -->
            <div class="flex-[1.5] bg-slate-800 rounded-lg p-2 border border-slate-700">
                <div class="flex justify-between items-center mb-1">
                    <div class="flex flex-col">
                        <div id="timerDisplay" class="font-mono text-lg text-white font-black leading-none">00:00</div>
                        <div id="diceDisplay" class="text-rose-400 font-bold text-[10px] mt-1">🎲 等待擲骰...</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="rollDiceDirect()" class="btn-touch bg-rose-500 text-white px-3 py-1 rounded text-[10px] font-bold">🎲 擲骰</button>
                        <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-500 text-white px-3 py-1 rounded text-[10px] font-bold">開始</button>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button onclick="addTimer(10)" class="bg-slate-600 text-white px-2 py-1 rounded text-[10px] flex-1">10s</button>
                    <button onclick="addTimer(30)" class="bg-slate-600 text-white px-2 py-1 rounded text-[10px] flex-1">30s</button>
                    <button onclick="addTimer(60)" class="bg-slate-600 text-white px-2 py-1 rounded text-[10px] flex-1">1m</button>
                    <button onclick="resetTimer()" class="bg-slate-700 text-white px-2 py-1 rounded text-[10px]">重置</button>
                </div>
            </div>

            <!-- 右側：抽籤區 -->
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex flex-col">
                <div id="pickerDisplay" class="text-amber-400 font-bold text-[10px] mb-auto italic">等待抽取結果...</div>
                <div class="flex gap-1 mt-2">
                    <button onclick="startPick('student')" class="btn-touch flex-1 bg-amber-500 text-white py-2 rounded text-[11px] font-bold shadow-lg">抽學生</button>
                    <button onclick="startPick('reward')" class="btn-touch flex-1 bg-purple-500 text-white py-2 rounded text-[11px] font-bold shadow-lg">抽獎懲</button>
                </div>
            </div>
        </div>
    </footer>

    <!-- 抽籤 Modal (提高 z-index 但 confetti 應在其上) -->
    <div id="mainModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl relative">
            <h3 id="modalTitle" class="text-slate-400 text-[10px] font-bold mb-4 uppercase italic">正在抽取</h3>
            <div class="min-h-[80px] flex items-center justify-center bg-slate-50 rounded-xl border-2 border-slate-100">
                <div id="modalResult" class="text-2xl font-black text-slate-800 px-2">...</div>
            </div>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold mt-4 shadow-lg active:scale-95 transition-all">確認結果</button>
        </div>
    </div>

    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script>
        // 數據狀態
        let isDuelModeActive = false; 
        const DUEL_THRESHOLD = 30; // 拉鋸觸發門檻
        
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: 0, icon: '🦸', color: 'text-red-500', barColor: 'bg-red-500', members: '名單A' },
            { id: 'B', name: '壞蛋聯盟', score: 0, icon: '😈', color: 'text-blue-500', barColor: 'bg-blue-500', members: '名單B' }
        ];

        let regularGroups = [
            { id: 1, name: '第一組', score: 0, icon: '🚗', barColor: 'bg-blue-500' },
            { id: 2, name: '第二組', score: 0, icon: '🚲', barColor: 'bg-green-500' },
            { id: 3, name: '第三組', score: 0, icon: '🏃', barColor: 'bg-purple-500' },
            { id: 4, name: '第四組', score: 0, icon: '🚀', barColor: 'bg-orange-500' },
            { id: 5, name: '第五組', score: 0, icon: '⛵', barColor: 'bg-pink-500' }
        ];

        let students = ["學生A", "學生B", "學生C", "學生D", "學生E", "學生F"];
        let rewards = ["加 1 分", "扣 1 分", "表演節目", "免死金牌", "小禮物", "再抽一次"];
        let scoreGoal = 20;

        function render() {
            const teamA = specialGroups[0];
            const teamB = specialGroups[1];
            
            // 只有在雙方都達到門檻且分數相等時觸發拉鋸
            if (teamA.score >= DUEL_THRESHOLD && teamB.score >= DUEL_THRESHOLD && teamA.score === teamB.score) {
                isDuelModeActive = true;
            }
            
            const modeLabel = document.getElementById('modeText');
            if (isDuelModeActive) {
                modeLabel.innerText = "🚨 終極拉鋸戰";
                modeLabel.className = "text-rose-500 font-bold animate-pulse text-[10px]";
            } else {
                modeLabel.innerText = `對抗進行中 (門檻: ${DUEL_THRESHOLD})`;
                modeLabel.className = "text-blue-600 text-[10px]";
            }

            const specialContainer = document.getElementById('special-zone');
            
            // 進度條顯示
            let leftWidth = 50;
            if (!isDuelModeActive) {
                let total = teamA.score + teamB.score;
                if (total > 0) leftWidth = (teamA.score / total) * 100;
            } else {
                // 拉鋸模式下，總分始終平衡
                leftWidth = 50;
            }

            specialContainer.className = `p-3 bg-slate-900 border-x border-slate-300 flex flex-col justify-center transition-colors duration-500 ${isDuelModeActive ? 'duel-pulse' : ''}`;
            specialContainer.innerHTML = `
                <div class="flex justify-between items-end mb-2">
                    <div class="text-left">
                        <div class="flex items-center gap-1">
                            <span class="text-2xl">${teamA.icon}</span>
                            <span class="text-white font-black text-sm">${teamA.name}</span>
                        </div>
                        <div class="member-info" onclick="editMembers('A')">${teamA.members}</div>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center gap-1 justify-end">
                            <span class="text-white font-black text-sm">${teamB.name}</span>
                            <span class="text-2xl">${teamB.icon}</span>
                        </div>
                        <div class="member-info" onclick="editMembers('B')">${teamB.members}</div>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4 mb-1">
                    <div class="text-4xl font-black text-red-500 tabular-nums">${teamA.score}</div>
                    <div class="text-4xl font-black text-blue-500 tabular-nums">${teamB.score}</div>
                </div>

                <div class="duel-track mb-3">
                    <div class="progress-left" style="width: ${leftWidth}%"></div>
                    <div class="progress-right" style="width: ${100 - leftWidth}%"></div>
                    <div class="vs-badge">VS</div>
                </div>

                <div class="flex gap-4">
                    <div class="flex flex-1 gap-1">
                        <button onclick="handleSpecialScore('A', 2)" class="flex-1 bg-red-600 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">+2</button>
                        <button onclick="handleSpecialScore('A', 1)" class="flex-1 bg-red-500 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">+1</button>
                        <button onclick="handleSpecialScore('A', -1)" class="px-2 bg-slate-700 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">-1</button>
                    </div>
                    <div class="flex flex-1 gap-1">
                        <button onclick="handleSpecialScore('B', -1)" class="px-2 bg-slate-700 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">-1</button>
                        <button onclick="handleSpecialScore('B', 1)" class="flex-1 bg-blue-500 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">+1</button>
                        <button onclick="handleSpecialScore('B', 2)" class="flex-1 bg-blue-600 text-white font-bold py-1 rounded text-xs shadow-lg active:scale-95 transition-all">+2</button>
                    </div>
                </div>
            `;

            const regularContainer = document.getElementById('regular-zone');
            regularContainer.innerHTML = regularGroups.map(g => {
                const progress = Math.min(100, (g.score / scoreGoal) * 100);
                return `
                    <div class="bg-white border-l-4 ${g.barColor.replace('bg-','border-')} rounded-lg shadow-sm px-4 py-1.5 flex flex-col justify-center flex-1 relative min-h-[50px]">
                        <div class="flex items-center justify-between z-30 gap-2 relative">
                            <div class="w-12 font-bold text-slate-500 text-[10px] leading-tight shrink-0">${g.name}</div>
                            <div class="text-3xl font-black text-slate-800 tabular-nums flex-1 text-center">${g.score}</div>
                            <div class="flex gap-1">
                                <button onclick="changeRegularScore(${g.id}, 2)" class="btn-touch bg-amber-500 text-white w-10 h-8 rounded-lg font-bold text-sm">+2</button>
                                <button onclick="changeRegularScore(${g.id}, 1)" class="btn-touch bg-emerald-500 text-white w-10 h-8 rounded-lg font-bold text-sm">+1</button>
                                <button onclick="changeRegularScore(${g.id}, -1)" class="btn-touch bg-slate-300 text-slate-600 w-10 h-8 rounded-lg font-bold text-sm">-1</button>
                            </div>
                        </div>
                        <div class="progress-track mt-1 h-4 bg-slate-100 rounded-full relative overflow-visible z-10">
                            <div class="progress-fill ${g.barColor} h-full rounded-full transition-all duration-500 opacity-40 shadow-inner" style="width: ${progress}%"></div>
                            <div class="runner-emoji absolute top-1/2 -translate-y-1/2" style="left: ${progress}%; margin-left: -10px;">
                                <span style="font-size: 20px;">${g.score >= scoreGoal ? '🏆' : g.icon}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleSpecialScore(groupId, delta) {
            const teamA = specialGroups[0];
            const teamB = specialGroups[1];

            if (isDuelModeActive) {
                // 拉鋸模式：一進一退
                if (groupId === 'A') {
                    teamA.score += delta;
                    teamB.score -= delta;
                } else {
                    teamB.score += delta;
                    teamA.score -= delta;
                }
            } else {
                // 正常累積
                const group = specialGroups.find(g => g.id === groupId);
                group.score += delta;
                
                // 檢查是否達到拉鋸觸發條件
                if (teamA.score >= DUEL_THRESHOLD && teamB.score >= DUEL_THRESHOLD && teamA.score === teamB.score) {
                    isDuelModeActive = true;
                    // 觸發彩色紙碎
                    confetti({ 
                        particleCount: 150, 
                        spread: 100, 
                        origin: { y: 0.5 },
                        colors: ['#ff0000', '#0000ff']
                    });
                }
            }
            
            // 數值下限修正
            teamA.score = Math.max(0, teamA.score);
            teamB.score = Math.max(0, teamB.score);
            
            render();
            playSound(delta > 0);
        }

        function changeRegularScore(id, delta) {
            const g = regularGroups.find(x => x.id === id);
            g.score = Math.max(0, g.score + delta);
            render(); playSound(delta > 0);
            if (g.score >= scoreGoal && delta > 0) {
                confetti({ particleCount: 80, origin: { y: 0.7 } });
            }
        }

        function playSound(isPlus) {
            const s = document.getElementById(isPlus ? 'plusSound' : 'minusSound');
            if(s) { s.currentTime = 0; s.play().catch(() => {}); }
        }

        function editMembers(id) {
            const group = specialGroups.find(g => g.id === id);
            const val = prompt(`輸入 ${group.name} 成員：`, group.members);
            if (val !== null) {
                group.members = val.trim() || '未設定';
                render();
            }
        }

        function startPick(mode) {
            const modal = document.getElementById('mainModal');
            const result = document.getElementById('modalResult');
            const pickerText = document.getElementById('pickerDisplay');
            modal.classList.remove('hidden');
            let list = mode === 'student' ? students : rewards;
            document.getElementById('modalTitle').innerText = mode === 'student' ? "隨機抽取學生" : "驚喜獎懲抽取";
            
            let i = 0;
            const itv = setInterval(() => {
                const current = list[Math.floor(Math.random() * list.length)];
                result.innerText = current;
                if(i++ > 15) { 
                    clearInterval(itv); 
                    pickerText.innerText = `最新結果：${current}`;
                    // 結果揭曉時噴灑彩色紙碎，設置較高 z-index 確保在 modal 之上
                    confetti({ 
                        particleCount: 100, 
                        spread: 70, 
                        origin: { y: 0.5 },
                        zIndex: 1000 
                    }); 
                }
            }, 80);
        }

        function rollDiceDirect() {
            let i = 0;
            const display = document.getElementById('diceDisplay');
            const itv = setInterval(() => {
                const val = Math.floor(Math.random() * 6) + 1;
                display.innerText = `🎲 點數：${val}`;
                if(i++ > 12) clearInterval(itv);
            }, 60);
        }

        let timerSeconds = 0, timerInterval = null;
        function addTimer(s) { timerSeconds += s; updateTimer(); }
        function resetTimer() { 
            timerSeconds = 0; 
            updateTimer(); 
            if(timerInterval) {
                clearInterval(timerInterval); 
                timerInterval = null; 
            }
            document.getElementById('timerToggle').innerText = '開始'; 
        }
        function updateTimer() {
            document.getElementById('timerDisplay').innerText = 
                `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`;
        }
        function toggleTimer() {
            if(timerInterval) { 
                clearInterval(timerInterval); 
                timerInterval = null; 
                document.getElementById('timerToggle').innerText = '開始';
            }
            else { 
                if (timerSeconds <= 0) return;
                document.getElementById('timerToggle').innerText = '暫停';
                timerInterval = setInterval(() => { 
                    if(timerSeconds > 0) { 
                        timerSeconds--; 
                        updateTimer(); 
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        document.getElementById('timerToggle').innerText = '開始';
                        playSound(false);
                        confetti({ particleCount: 100, spread: 160, zIndex: 1000 });
                    }
                }, 1000); 
            }
        }

        function resetAll() { 
            if(confirm('重置所有數據？')) { 
                specialGroups[0].score = 0; 
                specialGroups[1].score = 0; 
                isDuelModeActive = false; 
                regularGroups.forEach(g => g.score = 0); 
                document.getElementById('diceDisplay').innerText = `🎲 等待擲骰...`;
                document.getElementById('pickerDisplay').innerText = `等待抽取結果...`;
                render(); 
            } 
        }
        function addOneToAllRegular() { regularGroups.forEach(g => g.score++); render(); playSound(true); }
        function closeModal() { document.getElementById('mainModal').classList.add('hidden'); }

        window.onload = render;
    </script>
</body>
</html>
