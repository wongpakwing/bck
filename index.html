<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 全功能雙賽制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        #special-zone { height: 210px; }
        #regular-zone { height: calc(100vh - 450px); overflow-y: auto; }
        .btn-touch:active { transform: scale(0.92); }
        .track-bg {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 19%, rgba(0,0,0,0.05) 20%);
            background-size: 100% 100%;
        }
        .progress-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 8px; background: rgba(226, 232, 240, 0.5);
        }
        .progress-bar {
            height: 100%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .runner-icon {
            position: absolute; right: 0; top: 50%;
            transform: translate(50%, -60%); font-size: 24px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .special-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-top: 6px solid;
        }
        .member-tag {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 10px;
            display: inline-block;
            margin: 1px;
        }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden px-2 pt-2">
    <!-- 頁首 -->
    <header class="bg-white/90 backdrop-blur rounded-t-xl px-4 py-2 flex justify-between items-center border-b border-slate-300 shadow-sm">
        <div class="flex flex-col">
            <h1 class="font-bold text-slate-800 text-sm">課室雙賽制計分榜</h1>
            <div class="flex gap-2">
                <span class="text-[9px] bg-amber-100 text-amber-700 px-1.5 rounded">置頂：歸零挑戰</span>
                <span class="text-[9px] bg-blue-100 text-blue-700 px-1.5 rounded">下方：常規賽 (20分)</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="editStudents()" class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] border border-slate-300">總名單</button>
            <button onclick="editRewards()" class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] border border-slate-300">獎懲清單</button>
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">常規+1</button>
            <button onclick="resetAll()" class="bg-slate-400 text-white px-2 py-1 rounded-full text-[10px]">重置分數</button>
        </div>
    </header>

    <!-- 置頂特種競賽區 (學霸聯盟, 壞蛋聯盟) -->
    <div id="special-zone" class="grid grid-cols-2 gap-2 p-2 bg-slate-800 border-x border-slate-300">
        <!-- JS Render -->
    </div>

    <!-- 常規五組賽跑區 -->
    <div id="regular-zone" class="bg-slate-100 p-2 border-x border-slate-300 grid grid-rows-5 gap-2 no-scrollbar">
        <!-- JS Render -->
    </div>

    <!-- 底部控制台 -->
    <footer class="bg-slate-900 rounded-b-xl p-2 flex flex-col gap-2">
        <div class="flex gap-2">
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex justify-between items-center">
                <div id="pickerDisplay" class="text-amber-400 font-bold text-xs italic truncate">點擊抽人...</div>
                <div class="flex gap-1">
                    <button onclick="startPick('student')" class="btn-touch bg-amber-500 text-white px-2 py-1 rounded text-[10px] font-bold">抽學生</button>
                    <button onclick="startPick('reward')" class="btn-touch bg-purple-500 text-white px-2 py-1 rounded text-[10px] font-bold">抽獎懲</button>
                    <button onclick="rollDice()" class="btn-touch bg-rose-500 text-white px-2 py-1 rounded text-[10px] font-bold">🎲+1</button>
                </div>
            </div>
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex justify-between items-center">
                <div id="timerDisplay" class="font-mono font-black text-xl text-white">00:00</div>
                <div class="flex gap-1 flex-wrap justify-end">
                    <button onclick="addTimer(10)" class="text-white bg-slate-600 px-1.5 py-1 rounded text-[9px]">10s</button>
                    <button onclick="addTimer(30)" class="text-white bg-slate-600 px-1.5 py-1 rounded text-[9px]">30s</button>
                    <button onclick="addTimer(60)" class="text-white bg-slate-600 px-1.5 py-1 rounded text-[9px]">1m</button>
                    <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-500 text-white px-2 py-1 rounded text-[10px] font-bold">開始</button>
                </div>
            </div>
        </div>
    </footer>

    <!-- 全用動態 Modal -->
    <div id="mainModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl">
            <h3 id="modalTitle" class="text-slate-400 text-[10px] font-bold mb-4 uppercase italic">抽籤中</h3>
            <div id="modalContent" class="h-24 flex items-center justify-center bg-slate-50 rounded-xl border-4 border-slate-100">
                <div id="modalResult" class="text-2xl font-black text-slate-800 px-2">...</div>
            </div>
            <div class="flex gap-2 mt-6">
                <button id="rePickBtn" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-lg font-bold">再抽一次</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-lg font-bold">確認</button>
            </div>
        </div>
    </div>

    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="timerEndSound" src="https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3"></audio>

    <script>
        // 1. 數據結構
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: -50, color: 'border-red-500', icon: '🦸', members: ['學生A1', '學生A2'] },
            { id: 'B', name: '壞蛋聯盟', score: 50, color: 'border-blue-500', icon: '😈', members: ['學生B1', '學生B2'] }
        ];

        let regularGroups = [
            { id: 1, name: '第一組', score: 0, color: 'border-blue-500', barColor: 'bg-blue-500', icon: '🚗' },
            { id: 2, name: '第二組', score: 0, color: 'border-green-500', barColor: 'bg-green-500', icon: '🚲' },
            { id: 3, name: '第三組', score: 0, color: 'border-purple-500', barColor: 'bg-purple-500', icon: '🏃' },
            { id: 4, name: '第四組', score: 0, color: 'border-orange-500', barColor: 'bg-orange-500', icon: '🚀' },
            { id: 5, name: '第五組', score: 0, color: 'border-pink-500', barColor: 'bg-pink-500', icon: '⛵' }
        ];

        let students = ["學生1", "學生2", "學生3", "學生4", "學生5"];
        let rewards = ["加 1 分", "加 2 分", "減 1 分", "免死金牌", "表演節目", "小禮物", "坐前排"];
        let scoreGoal = 20;
        let lastPickMode = 'student';

        function playSound(isPlus) {
            const sound = document.getElementById(isPlus ? 'plusSound' : 'minusSound');
            if(sound) { sound.volume = 0.3; sound.currentTime = 0; sound.play(); }
        }

        // 2. 渲染與編輯邏輯
        function render() {
            const specialContainer = document.getElementById('special-zone');
            specialContainer.innerHTML = specialGroups.map(g => {
                const isWinner = g.score === 0;
                return `
                    <div class="special-card ${g.color} rounded-xl p-3 flex flex-col justify-between relative shadow-lg overflow-hidden">
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col">
                                <span onclick="renameGroup('${g.id}', true)" class="text-[10px] font-black text-slate-500 border-b border-dotted cursor-pointer">${g.name}</span>
                                <div onclick="editGroupMembers('${g.id}')" class="mt-1 flex flex-wrap max-h-[30px] overflow-y-auto cursor-pointer" title="編輯隊員">
                                    ${g.members.length > 0 ? 
                                        g.members.map(m => `<span class="member-tag">${m}</span>`).join('') : 
                                        '<span class="text-[8px] text-slate-400">點擊新增隊員</span>'}
                                </div>
                            </div>
                            <span class="text-xl">${isWinner ? '🏆' : g.icon}</span>
                        </div>
                        <div class="text-5xl font-black text-center my-1 tabular-nums ${isWinner ? 'text-emerald-500 scale-110' : 'text-slate-800'} transition-all">
                            ${g.score}
                        </div>
                        <div class="flex gap-1 z-10">
                            ${g.id === 'A' ? 
                                `<button onclick="changeSpecialScore('A', 5)" class="flex-1 bg-rose-500 text-white font-bold py-2 rounded-lg text-lg">+5</button>
                                 <button onclick="changeSpecialScore('A', 1)" class="flex-1 bg-rose-400 text-white font-bold py-2 rounded-lg text-lg">+1</button>` :
                                `<button onclick="changeSpecialScore('B', -5)" class="flex-1 bg-blue-500 text-white font-bold py-2 rounded-lg text-lg">-5</button>
                                 <button onclick="changeSpecialScore('B', -1)" class="flex-1 bg-blue-400 text-white font-bold py-2 rounded-lg text-lg">-1</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');

            const regularContainer = document.getElementById('regular-zone');
            regularContainer.innerHTML = regularGroups.map(g => {
                const progress = Math.min(100, (g.score / scoreGoal) * 100);
                const isWinner = g.score >= scoreGoal;
                return `
                    <div class="bg-white border-l-4 ${g.color} rounded shadow-sm px-4 flex flex-col justify-center relative overflow-visible">
                        <div class="absolute inset-0 track-bg opacity-10 pointer-events-none"></div>
                        <div class="flex items-center justify-between z-10">
                            <div onclick="renameGroup(${g.id}, false)" class="w-24 shrink-0 font-black text-slate-600 text-sm border-b border-dotted cursor-pointer">${g.name}</div>
                            <div class="text-4xl font-black text-slate-800 tabular-nums flex-1 text-center">${g.score}</div>
                            <div class="flex gap-1 shrink-0">
                                <button onclick="changeRegularScore(${g.id}, 1)" class="btn-touch bg-emerald-500 text-white w-9 h-9 rounded-lg font-black text-lg">+</button>
                                <button onclick="changeRegularScore(${g.id}, -1)" class="btn-touch bg-slate-200 text-slate-500 w-9 h-9 rounded-lg font-black text-lg">-</button>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar ${g.barColor}" style="width: ${progress}%"><span class="runner-icon">${isWinner ? '🏆' : g.icon}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 功能性操作
        function editGroupMembers(id) {
            const group = specialGroups.find(g => g.id === id);
            const list = prompt(`請輸入 ${group.name} 的隊員姓名（用逗號或空格隔開）：`, group.members.join(', '));
            if (list !== null) { 
                group.members = list.split(/[ ,，]+/).filter(n => n.trim()); 
                render(); 
            }
        }

        function renameGroup(id, isSpecial) {
            const arr = isSpecial ? specialGroups : regularGroups;
            const group = arr.find(g => g.id === id);
            const newName = prompt('請輸入新的組別名稱：', group.name);
            if (newName) { group.name = newName; render(); }
        }

        function editStudents() {
            const list = prompt('請輸入總名單姓名（用逗號或空格隔開）：', students.join(', '));
            if (list !== null) { students = list.split(/[ ,，]+/).filter(n => n.trim()); }
        }

        function editRewards() {
            const list = prompt('請輸入獎懲清單（用逗號或空格隔開）：', rewards.join(', '));
            if (list !== null) { rewards = list.split(/[ ,，]+/).filter(n => n.trim()); }
        }

        function changeSpecialScore(id, delta) {
            const g = specialGroups.find(x => x.id === id);
            const old = g.score;
            g.score += delta;
            if (id === 'A' && g.score > 0) g.score = 0;
            if (id === 'B' && g.score < 0) g.score = 0;
            render();
            playSound(delta > 0);
            if (g.score === 0 && old !== 0) confetti({ particleCount: 150 });
        }

        function changeRegularScore(id, delta) {
            const g = regularGroups.find(x => x.id === id);
            g.score = Math.max(0, g.score + delta);
            render();
            playSound(delta > 0);
            if (g.score >= scoreGoal && delta > 0) confetti({ particleCount: 50 });
        }

        function addOneToAllRegular() {
            regularGroups.forEach(g => g.score++);
            render(); playSound(true);
        }

        function resetAll() {
            if(confirm('重置所有分數？')) {
                specialGroups[0].score = -50; specialGroups[1].score = 50;
                regularGroups.forEach(g => g.score = 0);
                render();
            }
        }

        function startPick(mode) {
            lastPickMode = mode;
            const modal = document.getElementById('mainModal');
            const res = document.getElementById('modalResult');
            const title = document.getElementById('modalTitle');
            const rePickBtn = document.getElementById('rePickBtn');
            const pool = mode === 'student' ? students : rewards;
            
            title.innerText = mode === 'student' ? '抽籤中...' : '獎懲抽取中...';
            modal.classList.remove('hidden');
            rePickBtn.onclick = () => startPick(mode);
            
            let i = 0;
            const itv = setInterval(() => {
                res.innerText = pool[Math.floor(Math.random()*pool.length)];
                if(i++ > 15) { 
                    clearInterval(itv); 
                    const final = pool[Math.floor(Math.random()*pool.length)];
                    res.innerText = final;
                    if(mode === 'student') document.getElementById('pickerDisplay').innerText = final;
                    confetti({ particleCount: 80, spread: 50 });
                }
            }, 80);
        }

        function rollDice() {
            const modal = document.getElementById('mainModal');
            const res = document.getElementById('modalResult');
            const rePickBtn = document.getElementById('rePickBtn');
            document.getElementById('modalTitle').innerText = '骰子投擲 (點數+1)...';
            modal.classList.remove('hidden');
            rePickBtn.onclick = rollDice;

            let i = 0;
            const itv = setInterval(() => {
                const tempVal = Math.floor(Math.random()*6)+1;
                res.innerText = tempVal + 1;
                if(i++ > 10) { 
                    clearInterval(itv); 
                    const finalVal = Math.floor(Math.random()*6)+1;
                    res.innerHTML = `<span class="text-slate-400 text-sm">🎲${finalVal} ➜</span> ${finalVal + 1}`; 
                }
            }, 100);
        }

        function closeModal() { document.getElementById('mainModal').classList.add('hidden'); }

        let timerSeconds = 0;
        let timerInterval = null;
        function addTimer(s) { timerSeconds += s; updateTimer(); }
        function updateTimer() {
            const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
            const s = (timerSeconds%60).toString().padStart(2,'0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText="繼續"; }
            else {
                timerInterval = setInterval(() => {
                    if(timerSeconds > 0) { timerSeconds--; updateTimer(); }
                    else { 
                        clearInterval(timerInterval); timerInterval=null; 
                        document.getElementById('timerEndSound').play(); 
                        document.getElementById('timerToggle').innerText="開始";
                    }
                }, 1000);
                document.getElementById('timerToggle').innerText="暫停";
            }
        }

        window.onload = render;
    </script>
</body>
</html>
