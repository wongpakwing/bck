<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root { --sat: 0.95; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; background: #f1f5f9;
            height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .glass-card { background: rgba(255, 255, 255, var(--sat)); backdrop-filter: blur(10px); }
        
        /* 碎片按鈕樣式 - 縮小以容納18個 */
        .shard-btn {
            font-size: 11px; filter: grayscale(1); opacity: 0.2;
            transition: all 0.2s; cursor: pointer;
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .shard-btn.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
        
        #regular-zone-container::-webkit-scrollbar { width: 4px; }
        #regular-zone-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .score-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 0.75rem; font-weight: 900;
            transition: transform 0.1s; color: white; flex-shrink: 0;
        }
        .score-btn:active { transform: scale(0.9); }
