<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 完整功能版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        #special-zone { height: 160px; shrink: 0; }
        #regular-zone { flex: 1; min-height: 0; overflow-y: auto; }
        .btn-touch:active { transform: scale(0.92); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 對抗進度條 */
        .duel-track {
            position: relative; height: 20px; background: #e2e8f0;
            border-radius: 10px; overflow: hidden; border: 2px solid #1e293b;
        }
        .progress-left {
            position: absolute; left: 0; height: 100%; background: #ef4444;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-right {
            position: absolute; right: 0; height: 100%; background: #3b82f6;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .vs-badge {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            z-index: 20; background: white; color: #1e293b; font-weight: 900;
            padding: 1px 6px; border-radius: 999px; font-size: 10px; border: 1.5px solid #1e293b;
        }

        /* 骰子動畫 */
        .dice-rolling { animation: dice-shake 0.15s infinite; }
        @keyframes dice-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-5deg); }
            40% { transform: translate(-3px, 0px) rotate(5deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(-1px, 2px) rotate(-5deg); }
        }

        .dice-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
        }
        .dice-box {
            width: 60px; height: 60px; background: white; border: 3px solid #1e293b;
            border-radius: 12px; display: flex; items-center; justify-content: center;
            font-size: 32px; font-weight: 900; color: #1e293b;
            box-shadow: 0 4px 0 #1e293b;
        }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden px-2 pt-2 h-screen flex flex-col text-slate-800">

    <!-- 頁首 -->
    <header class="bg-white/95 backdrop-blur rounded-t-xl px-4 py-2 flex justify-between items-center border-b border-slate-300 shadow-sm shrink-0">
        <h1 class="font-bold text-xs">課室計分榜 <span id="modeText" class="text-blue-600">(勢力對峙)</span></h1>
        <div class="flex gap-2">
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm active:scale-95">全體 +1</button>
            <button onclick="resetAll()" class="bg-slate-400 text-white px-3 py-1 rounded-lg text-[10px] active:scale-95">重置</button>
        </div>
    </header>

    <!-- 特種競賽區 (勢力) -->
    <div id="special-zone" class="p-3 bg-slate-900 border-x border-slate-300 flex flex-col justify-center shadow-inner"></div>

    <!-- 常規分組區 -->
    <div id="regular-zone" class="bg-slate-100 p-2 border-x border-slate-300 flex flex-col gap-2 no-scrollbar"></div>

    <!-- 底部控制台 -->
    <footer class="bg-slate-900 rounded-b-xl p-2 flex flex-col gap-2 shrink-0 pb-3 shadow-2xl">
        <div class="flex gap-2 w-full">
            <!-- 左側：計時控制 -->
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700">
                <div class="flex justify-between items-center mb-1">
                    <div id="timerDisplay" class="font-mono text-2xl text-white font-black leading-none tracking-tighter">00:00</div>
                    <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-500 text-white px-4 py-1 rounded text-[11px] font-bold shadow-lg active:scale-90">開始</button>
                </div>
                <div class="flex gap-1 overflow-x-auto no-scrollbar">
                    <button onclick="addTimer(30)" class="bg-slate-600 text-white px-1.5 py-1 rounded text-[10px] flex-1 font-bold whitespace-nowrap">30s</button>
                    <button onclick="addTimer(60)" class="bg-slate-600 text-white px-1.5 py-1 rounded text-[10px] flex-1 font-bold whitespace-nowrap">1m</button>
                    <button onclick="resetTimer()" class="bg-slate-700 text-white px-2 py-1 rounded text-[10px] active:scale-90">重置</button>
                </div>
            </div>
            <!-- 右側：抽籤與擲骰 -->
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex flex-col">
                <div id="pickerDisplay" class="text-amber-400 font-bold text-[10px] mb-auto italic h-4 truncate">準備就緒...</div>
                <div class="flex gap-1 mt-2">
                    <button onclick="startPick('student')" class="btn-touch flex-1 bg-amber-500 text-white py-2 rounded text-[11px] font-bold shadow-lg">抽籤</button>
                    <button onclick="openDiceModal()" class="btn-touch flex-1 bg-rose-500 text-white py-2 rounded text-[11px] font-bold shadow-lg">🎲 擲骰</button>
                </div>
            </div>
        </div>
    </footer>

    <!-- 擲骰彈窗 -->
    <div id="diceModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl scale-up">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Dice Simulator</span>
                <span id="diceCountBadge" class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-[10px] font-bold">1 顆骰子</span>
            </div>
            
            <div id="diceList" class="dice-container min-h-[120px] items-center p-4 bg-slate-50 rounded-2xl mb-4 border-2 border-dashed border-slate-200">
                <!-- 骰子生成區 -->
            </div>

            <div class="mb-6">
                <div class="text-slate-400 text-xs mb-1 font-bold uppercase">Total Score</div>
                <div id="totalDiceScore" class="text-7xl font-black text-rose-500 tabular-nums">0</div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="changeDiceCount(1)" class="bg-amber-500 text-white py-3 rounded-2xl font-bold flex flex-col items-center shadow-lg active:scale-95">
                    <span class="text-[10px] opacity-80 uppercase">Add Dice</span>
                    <span>🎲 +1 骰</span>
                </button>
                <button onclick="changeDiceCount(-1)" class="bg-slate-200 text-slate-600 py-3 rounded-2xl font-bold flex flex-col items-center active:scale-95">
                    <span class="text-[10px] opacity-80 uppercase">Remove Last</span>
                    <span>🎲 -1 骰</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="reRollAll()" class="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold text-lg active:scale-95 border-b-4 border-slate-300">重新再擲</button>
                <button onclick="closeDiceModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95">確認並關閉</button>
            </div>
        </div>
    </div>

    <!-- 抽籤彈窗 -->
    <div id="pickModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center shadow-2xl">
            <h3 id="pickTitle" class="text-slate-400 text-xs font-bold mb-4 italic tracking-widest">RANDOM PICKER</h3>
            <div class="min-h-[120px] flex items-center justify-center bg-slate-50 rounded-2xl border-4 border-slate-100">
                <div id="pickResult" class="text-4xl font-black text-slate-800">...</div>
            </div>
            <button onclick="document.getElementById('pickModal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-6 shadow-xl active:scale-95">確認結果</button>
        </div>
    </div>

    <!-- 音效 -->
    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="diceSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        let isDuelModeActive = false;
        const DUEL_THRESHOLD = 30;
        let specialGroups = [
            { id: 'A', name: '紅方陣營', score: 0, icon: '🛡️' },
            { id: 'B', name: '藍方陣營', score: 0, icon: '⚔️' }
        ];
        let regularGroups = [
            { id: 1, name: '第一組', score: 0, icon: '🚗', barColor: 'bg-blue-500' },
            { id: 2, name: '第二組', score: 0, icon: '🚲', barColor: 'bg-green-500' },
            { id: 3, name: '第三組', score: 0, icon: '🏃', barColor: 'bg-purple-500' },
            { id: 4, name: '第四組', score: 0, icon: '🚀', barColor: 'bg-orange-500' },
            { id: 5, name: '第五組', score: 0, icon: '⛵', barColor: 'bg-pink-500' }
        ];

        let students = ["學生A", "學生B", "學生C", "學生D", "學生E", "學生F", "學生G"];
        let currentDiceValues = [];

        function render() {
            const teamA = specialGroups[0]; const teamB = specialGroups[1];
            if (teamA.score >= DUEL_THRESHOLD && teamB.score >= DUEL_THRESHOLD && teamA.score === teamB.score) isDuelModeActive = true;
            document.getElementById('modeText').innerText = isDuelModeActive ? "🚨 終極拉鋸戰" : `穩定推進 (門檻: ${DUEL_THRESHOLD})`;
            
            const specialContainer = document.getElementById('special-zone');
            let leftWidth = 50;
            if (isDuelModeActive) {
                leftWidth = 50 + ((teamA.score - teamB.score) / 20) * 50;
                leftWidth = Math.max(5, Math.min(95, leftWidth));
            } else {
                let total = teamA.score + teamB.score;
                leftWidth = total > 0 ? (teamA.score / total) * 100 : 50;
            }

            specialContainer.innerHTML = `
                <div class="flex justify-between items-center text-white text-[10px] font-black mb-1 px-1">
                    <span class="uppercase tracking-tighter">${teamA.icon} ${teamA.name}</span>
                    <span class="uppercase tracking-tighter">${teamB.name} ${teamB.icon}</span>
                </div>
                <div class="flex justify-between items-center mb-1">
                    <span class="text-4xl font-black text-red-500 italic drop-shadow-sm">${teamA.score}</span>
                    <span class="text-4xl font-black text-blue-500 italic drop-shadow-sm">${teamB.score}</span>
                </div>
                <div class="duel-track mb-3">
                    <div class="progress-left" style="width: ${leftWidth}%"></div>
                    <div class="progress-right" style="width: ${100 - leftWidth}%"></div>
                    <div class="vs-badge">VS</div>
                </div>
                <div class="flex gap-4">
                    <div class="flex flex-1 gap-1"><button onclick="scoreSpec('A',1)" class="flex-1 bg-red-500 text-white py-1 rounded-lg text-[10px] font-black shadow-lg active:scale-95">+1</button></div>
                    <div class="flex flex-1 gap-1"><button onclick="scoreSpec('B',1)" class="flex-1 bg-blue-500 text-white py-1 rounded-lg text-[10px] font-black shadow-lg active:scale-95">+1</button></div>
                </div>
            `;

            document.getElementById('regular-zone').innerHTML = regularGroups.map(g => `
                <div class="bg-white rounded-xl p-3 flex flex-row items-center relative border-l-8 ${g.barColor.replace('bg-','border-')} shadow-sm group">
                    <div class="flex flex-col flex-1">
                        <span class="font-black text-slate-500 text-[10px] uppercase">${g.id} GROUP</span>
                        <span class="font-black text-slate-800 text-lg leading-none mb-1">${g.name}</span>
                        <div class="w-2/3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="${g.barColor} h-full transition-all duration-500" style="width: ${Math.min(100, g.score*5)}%"></div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="text-4xl font-black text-slate-800 mr-2 tabular-nums">${g.score}</div>
                        <!-- 修改處：每個組別現在都有 +2, +1, -1 -->
                        <div class="flex flex-col gap-1">
                            <div class="flex gap-1">
                                <button onclick="scoreReg(${g.id},2)" class="bg-amber-400 text-white w-10 py-1.5 rounded-lg font-black text-xs shadow-sm active:scale-90">+2</button>
                                <button onclick="scoreReg(${g.id},1)" class="bg-emerald-500 text-white w-10 py-1.5 rounded-lg font-black text-xs shadow-sm active:scale-90">+1</button>
                            </div>
                            <button onclick="scoreReg(${g.id},-1)" class="bg-slate-200 text-slate-500 w-full py-1 rounded-lg font-black text-[10px] active:scale-90">-1</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function scoreSpec(id, d) { const g = specialGroups.find(x => x.id === id); g.score += d; render(); playSound(d>0); }
        function scoreReg(id, d) { const g = regularGroups.find(x => x.id === id); g.score += d; render(); playSound(d>0); }

        // --- 擲骰邏輯 ---
        function openDiceModal() { reRollAll(); document.getElementById('diceModal').classList.remove('hidden'); }
        function reRollAll() { currentDiceValues = []; document.getElementById('diceList').innerHTML = ""; document.getElementById('totalDiceScore').innerText = "0"; changeDiceCount(1); }
        function changeDiceCount(delta) {
            const list = document.getElementById('diceList');
            const diceSound = document.getElementById('diceSound');
            if (delta > 0) {
                const newIdx = currentDiceValues.length;
                currentDiceValues.push(0);
                const diceEl = document.createElement('div');
                diceEl.className = "dice-box dice-rolling";
                diceEl.innerText = "?";
                list.appendChild(diceEl);
                if(diceSound) { diceSound.currentTime = 0; diceSound.play().catch(()=>{}); }
                let count = 0;
                const itv = setInterval(() => {
                    diceEl.innerText = Math.floor(Math.random() * 6) + 1;
                    if (count++ > 12) {
                        clearInterval(itv);
                        const val = Math.floor(Math.random() * 6) + 1;
                        diceEl.innerText = val;
                        diceEl.classList.remove('dice-rolling');
                        currentDiceValues[newIdx] = val;
                        updateDiceUI();
                        confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 }, colors: ['#fbbf24', '#f43f5e'] });
                    }
                }, 60);
            } else if (currentDiceValues.length > 0) {
                currentDiceValues.pop(); list.removeChild(list.lastChild); updateDiceUI();
            }
        }
        function updateDiceUI() {
            const total = currentDiceValues.reduce((a, b) => a + b, 0);
            document.getElementById('totalDiceScore').innerText = total;
            document.getElementById('diceCountBadge').innerText = `${currentDiceValues.length} 顆骰子`;
        }
        function closeDiceModal() {
            const total = currentDiceValues.reduce((a, b) => a + b, 0);
            if (total > 0) document.getElementById('pickerDisplay').innerText = `🎲 擲骰結果：${total}`;
            document.getElementById('diceModal').classList.add('hidden');
        }

        // --- 抽籤邏輯 ---
        function startPick(mode) {
            const modal = document.getElementById('pickModal');
            const res = document.getElementById('pickResult');
            modal.classList.remove('hidden');
            let list = students;
            let i = 0;
            const itv = setInterval(() => {
                res.innerText = list[Math.floor(Math.random()*list.length)];
                if(i++ > 15) { 
                    clearInterval(itv); 
                    document.getElementById('pickerDisplay').innerText = `👤 抽中：${res.innerText}`;
                    confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
                }
            }, 80);
        }

        // --- 計時器邏輯 ---
        let timerSeconds = 0, timerInterval = null;
        function addTimer(s) { timerSeconds += s; updateT(); }
        function resetTimer() { timerSeconds = 0; updateT(); clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText = "開始"; }
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`; }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText = "開始"; }
            else if(timerSeconds > 0) { 
                document.getElementById('timerToggle').innerText = "暫停";
                timerInterval = setInterval(() => { 
                    if(timerSeconds > 0) { timerSeconds--; updateT(); } 
                    else { resetTimer(); confetti({ particleCount: 150, spread: 100 }); }
                }, 1000); 
            }
        }

        function playSound(p) { const s = document.getElementById(p?'plusSound':'minusSound'); if(s){s.currentTime=0;s.play().catch(()=>{});} }
        function resetAll() { if(confirm('重置所有分數與數據？')) location.reload(); }
        function addOneToAllRegular() { regularGroups.forEach(g=>g.score++); render(); playSound(true); }

        window.onload = render;
    </script>
</body>
</html>
