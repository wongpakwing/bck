<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 佈局優化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        
        /* 佈局分配：頂部固定，中間自適應，底部固定 */
        #special-zone { height: 160px; shrink: 0; }
        #regular-zone { flex: 1; min-height: 0; } /* 讓下方五組平分剩餘空間 */

        .btn-touch:active { transform: scale(0.92); }
        
        /* 進度條容器 */
        .progress-track {
            position: relative;
            height: 10px;
            background: rgba(226, 232, 240, 0.8);
            border-radius: 999px;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 999px;
        }

        /* 圖標層級 */
        .runner-emoji {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            z-index: 50;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            pointer-events: none;
            line-height: 1;
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .duel-pulse {
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0px rgba(244, 63, 94, 0); }
        }

        .member-list {
            font-size: 10px;
            color: #64748b;
            background: rgba(241, 245, 249, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            cursor: pointer;
            border: 1px dashed #cbd5e1;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden px-2 pt-2 h-screen flex flex-col text-slate-800">

    <!-- 頁首 -->
    <header class="bg-white/95 backdrop-blur rounded-t-xl px-4 py-2 flex justify-between items-center border-b border-slate-300 shadow-sm shrink-0">
        <div>
            <h1 class="font-bold text-xs">課室計分榜 <span id="modeText" class="text-blue-600">(常規)</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">常規全體 +1</button>
            <button onclick="resetAll()" class="bg-slate-400 text-white px-3 py-1 rounded-lg text-[10px]">全部重置</button>
        </div>
    </header>

    <!-- 特種競賽區 (縮小高度) -->
    <div id="special-zone" class="grid grid-cols-2 gap-2 p-2 bg-slate-800 border-x border-slate-300">
        <!-- JS Render -->
    </div>

    <!-- 常規區 (平分剩餘空間) -->
    <div id="regular-zone" class="bg-slate-100 p-2 border-x border-slate-300 flex flex-col gap-2 no-scrollbar overflow-hidden">
        <!-- JS Render -->
    </div>

    <!-- 底部控制台 -->
    <footer class="bg-slate-900 rounded-b-xl p-2 flex flex-col gap-2 shrink-0">
        <div class="flex gap-2">
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700">
                <div id="pickerDisplay" class="text-amber-400 font-bold text-[10px] mb-1 italic">等待抽籤...</div>
                <div class="flex gap-1">
                    <button onclick="startPick('student')" class="btn-touch flex-1 bg-amber-500 text-white py-1.5 rounded text-[11px] font-bold">抽學生</button>
                    <button onclick="rollDiceDirect()" class="btn-touch flex-1 bg-rose-500 text-white py-1.5 rounded text-[11px] font-bold">🎲 擲骰</button>
                </div>
            </div>
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700">
                <div class="flex justify-between items-center mb-1">
                    <div id="timerDisplay" class="font-mono text-lg text-white font-black">00:00</div>
                    <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-500 text-white px-3 py-1 rounded text-[10px] font-bold">開始</button>
                </div>
                <div class="flex gap-1">
                    <button onclick="addTimer(60)" class="bg-slate-600 text-white px-2 py-1 rounded text-[10px] flex-1">1m</button>
                    <button onclick="resetTimer()" class="bg-slate-700 text-white px-2 py-1 rounded text-[10px]">重置</button>
                </div>
            </div>
        </div>
    </footer>

    <!-- 抽籤 Modal -->
    <div id="mainModal" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl">
            <h3 id="modalTitle" class="text-slate-400 text-[10px] font-bold mb-4 uppercase italic">正在抽取</h3>
            <div class="min-h-[80px] flex items-center justify-center bg-slate-50 rounded-xl border-2 border-slate-100">
                <div id="modalResult" class="text-2xl font-black text-slate-800">...</div>
            </div>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold mt-4 shadow-lg">確認</button>
        </div>
    </div>

    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script>
        // 數據狀態
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: -50, icon: '🦸', color: 'border-red-500', barColor: 'bg-red-500', members: '點擊輸入學生名字' },
            { id: 'B', name: '壞蛋聯盟', score: 50, icon: '😈', color: 'border-blue-500', barColor: 'bg-blue-500', members: '點擊輸入學生名字' }
        ];

        let regularGroups = [
            { id: 1, name: '第一組', score: 0, icon: '🚗', barColor: 'bg-blue-500' },
            { id: 2, name: '第二組', score: 0, icon: '🚲', barColor: 'bg-green-500' },
            { id: 3, name: '第三組', score: 0, icon: '🏃', barColor: 'bg-purple-500' },
            { id: 4, name: '第四組', score: 0, icon: '🚀', barColor: 'bg-orange-500' },
            { id: 5, name: '第五組', score: 0, icon: '⛵', barColor: 'bg-pink-500' }
        ];

        let students = ["學生1", "學生2", "學生3", "學生4", "學生5"];
        let scoreGoal = 20;

        function render() {
            const isDuel = Math.abs(specialGroups[0].score) === Math.abs(specialGroups[1].score);
            document.getElementById('modeText').innerText = isDuel ? "拉鋸模式啟動" : "各隊得分中";
            document.getElementById('modeText').className = isDuel ? "text-rose-600 font-black animate-pulse text-[10px]" : "text-blue-600 text-[10px]";

            // 1. 渲染頂部兩組
            const specialContainer = document.getElementById('special-zone');
            specialContainer.innerHTML = specialGroups.map(g => {
                let progress = 0;
                if (g.id === 'A') progress = ((g.score - (-50)) / (0 - (-50))) * 100;
                else progress = ((50 - g.score) / (50 - 0)) * 100;
                progress = Math.min(100, Math.max(0, progress));

                return `
                    <div class="bg-white rounded-xl p-2 flex flex-col justify-between relative shadow-md h-full border-t-4 ${g.color} ${isDuel ? 'duel-pulse' : ''}">
                        <div class="flex justify-between items-start leading-tight">
                            <div class="flex-1 min-w-0">
                                <span class="text-[9px] font-black text-slate-400 block">${g.name}</span>
                                <div class="member-list" onclick="editMembers('${g.id}')">${g.members}</div>
                            </div>
                            <span class="text-xl ml-1">${g.score === 0 ? '🏆' : g.icon}</span>
                        </div>
                        
                        <div class="text-3xl font-black text-center tabular-nums leading-none my-1">
                            ${g.score}
                        </div>

                        <div class="flex gap-1">
                            <button onclick="handleSpecialScore('${g.id}', 1)" class="flex-1 bg-emerald-500 text-white font-bold py-1 rounded text-[10px]">+1</button>
                            <button onclick="handleSpecialScore('${g.id}', -1)" class="flex-1 bg-rose-500 text-white font-bold py-1 rounded text-[10px]">-1</button>
                        </div>

                        <div class="progress-track">
                            <div class="progress-fill ${g.barColor}" style="width: ${progress}%;"></div>
                            <div class="runner-emoji" style="left: ${progress}%;">
                                ${g.score === 0 ? '🏆' : g.icon}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 2. 渲染下方五組
            const regularContainer = document.getElementById('regular-zone');
            regularContainer.innerHTML = regularGroups.map(g => {
                const progress = Math.min(100, (g.score / scoreGoal) * 100);
                return `
                    <div class="bg-white border-l-4 ${g.barColor.replace('bg-','border-')} rounded-lg shadow-sm px-4 flex flex-col justify-center flex-1 relative min-h-[40px]">
                        <div class="flex items-center justify-between z-10">
                            <div class="w-12 font-bold text-slate-500 text-[10px] leading-tight">${g.name}</div>
                            <div class="text-3xl font-black text-slate-800 tabular-nums flex-1 text-center">${g.score}</div>
                            <div class="flex gap-1">
                                <button onclick="changeRegularScore(${g.id}, 1)" class="btn-touch bg-emerald-500 text-white w-8 h-8 rounded-lg font-black text-lg">+</button>
                                <button onclick="changeRegularScore(${g.id}, -1)" class="btn-touch bg-slate-200 text-slate-500 w-8 h-8 rounded-lg font-black text-lg">-</button>
                            </div>
                        </div>
                        <!-- 進度條修復：增加顏色棒與 Emoji -->
                        <div class="progress-track mt-1 h-1.5 relative overflow-visible">
                            <div class="progress-fill ${g.barColor} opacity-40" style="width: ${progress}%"></div>
                            <div class="runner-emoji" style="left: ${progress}%; font-size: 18px;">
                                ${g.score >= scoreGoal ? '🏆' : g.icon}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 修改特殊組分數邏輯
        function handleSpecialScore(groupId, delta) {
            const teamA = specialGroups[0];
            const teamB = specialGroups[1];
            const isDuel = Math.abs(teamA.score) === Math.abs(teamB.score);

            if (isDuel) {
                // 拉鋸戰：一個靠近 0，另一個就遠離 0
                if (groupId === 'A') {
                    if (delta > 0) { teamA.score = Math.min(0, teamA.score + 1); teamB.score = Math.min(50, teamB.score + 1); }
                    else { teamA.score = Math.max(-50, teamA.score - 1); teamB.score = Math.max(0, teamB.score - 1); }
                } else {
                    if (delta > 0) { teamB.score = Math.max(0, teamB.score - 1); teamA.score = Math.max(-50, teamA.score - 1); }
                    else { teamB.score = Math.min(50, teamB.score + 1); teamA.score = Math.min(0, teamA.score + 1); }
                }
            } else {
                // 獨立得分
                if (groupId === 'A') teamA.score = Math.min(0, Math.max(-50, teamA.score + delta));
                else {
                    if (delta > 0) teamB.score = Math.max(0, teamB.score - 1);
                    else teamB.score = Math.min(50, teamB.score + 1);
                }
            }
            render();
            playSound(delta > 0);
            if (teamA.score === 0 || teamB.score === 0) confetti({ particleCount: 100 });
        }

        function changeRegularScore(id, delta) {
            const g = regularGroups.find(x => x.id === id);
            g.score = Math.max(0, g.score + delta);
            render(); playSound(delta > 0);
            if (g.score >= scoreGoal && delta > 0) confetti({ particleCount: 50 });
        }

        function playSound(isPlus) {
            const s = document.getElementById(isPlus ? 'plusSound' : 'minusSound');
            s.currentTime = 0; s.play();
        }

        function editMembers(id) {
            const group = specialGroups.find(g => g.id === id);
            const val = prompt('請輸入學生姓名：', group.members === '點擊輸入學生名字' ? '' : group.members);
            if (val !== null) {
                group.members = val.trim() || '點擊輸入學生名字';
                render();
            }
        }

        // 抽籤、計時、擲骰邏輯 (簡化)
        function startPick(mode) {
            const modal = document.getElementById('mainModal');
            modal.classList.remove('hidden');
            let i = 0;
            const itv = setInterval(() => {
                document.getElementById('modalResult').innerText = students[Math.floor(Math.random()*students.length)];
                if(i++ > 12) { clearInterval(itv); confetti({ particleCount: 30 }); }
            }, 80);
        }

        function rollDiceDirect() {
            let i = 0;
            const itv = setInterval(() => {
                const val = Math.floor(Math.random()*6)+1;
                document.getElementById('pickerDisplay').innerText = `🎲 擲出：${val}`;
                if(i++ > 10) clearInterval(itv);
            }, 60);
        }

        let timerSeconds = 0, timerInterval = null;
        function addTimer(s) { timerSeconds += s; updateTimer(); }
        function resetTimer() { timerSeconds = 0; updateTimer(); clearInterval(timerInterval); timerInterval = null; }
        function updateTimer() {
            document.getElementById('timerDisplay').innerText = 
                `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`;
        }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            else { timerInterval = setInterval(() => { if(timerSeconds > 0) { timerSeconds--; updateTimer(); } }, 1000); }
        }

        function resetAll() { if(confirm('確定要全部清零重置？')) location.reload(); }
        function addOneToAllRegular() { regularGroups.forEach(g => g.score++); render(); playSound(true); }
        function closeModal() { document.getElementById('mainModal').classList.add('hidden'); }

        window.onload = render;
    </script>
</body>
</html>
