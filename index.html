`
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 操作優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; 
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .timer-mini { font-size: 1.8rem; line-height: 1; font-weight: 900; letter-spacing: -1px; }
        .btn-touch:active { transform: scale(0.95); }
        
        /* 拉鋸條樣式 */
        .duel-track {
            position: relative; height: 12px; background: #0f172a;
            border-radius: 6px; overflow: hidden; border: 1px solid #334155;
            display: flex; align-items: center; justify-content: center;
        }
        .progress-left {
            position: absolute; left: 0; height: 100%; background: #ef4444;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-right {
            position: absolute; right: 0; height: 100%; background: #3b82f6;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .lock-text {
            position: relative; z-index: 10; font-size: 9px; font-weight: bold; color: rgba(255,255,255,0.4);
        }

        /* 小組進度條 */
        .group-progress-bar {
            height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 4px;
        }
        .group-progress-fill {
            height: 100%; transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="p-2 gap-2">

    <!-- 頂部管理區 -->
    <header class="bg-white rounded-xl p-2 shadow-sm flex justify-between items-center shrink-0 border border-slate-100">
        <div class="flex gap-2">
            <button onclick="openSettings('students')" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-slate-200">👤 名單</button>
            <button onclick="openSettings('events')" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-slate-200">⚙️ 獎懲</button>
        </div>
        <div class="flex gap-2">
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">全體 +1</button>
            <button onclick="resetAll()" class="bg-slate-200 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-bold">重置</button>
        </div>
    </header>

    <!-- 對抗區 (聯盟) -->
    <div id="special-zone" class="bg-slate-900 rounded-xl p-3 shrink-0 shadow-lg">
        <!-- JS 渲染 -->
    </div>

    <!-- 常規分組區 -->
    <div id="regular-zone" class="flex flex-col gap-1.5 flex-grow">
        <!-- JS 渲染 -->
    </div>

    <!-- 底部綜合控制台 -->
    <footer class="flex gap-2 h-24 shrink-0">
        <!-- 倒計時 -->
        <div class="bg-white rounded-xl p-2 shadow-md flex flex-col items-center justify-center w-40 border border-slate-100">
            <div id="timerDisplay" class="timer-mini font-mono text-slate-900 mb-1">00:00</div>
            <div class="grid grid-cols-2 gap-1 w-full">
                <button onclick="addTimer(10)" class="bg-slate-50 text-slate-600 py-0.5 rounded text-[9px] font-bold border border-slate-200">+10s</button>
                <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-600 text-white py-0.5 rounded text-[9px] font-bold">開始</button>
                <button onclick="addTimer(60)" class="bg-slate-50 text-slate-600 py-0.5 rounded text-[9px] font-bold border border-slate-200">+1m</button>
                <button onclick="resetTimer()" class="bg-slate-100 text-slate-400 py-0.5 rounded text-[9px] font-bold">清零</button>
            </div>
        </div>

        <!-- 功能按鈕 -->
        <div class="grid grid-cols-3 gap-2 flex-grow">
            <button onclick="startPick('student')" class="bg-amber-500 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">👤</span>
                <span class="text-[10px]">抽人</span>
            </button>
            <button onclick="startPick('event')" class="bg-purple-600 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">🎁</span>
                <span class="text-[10px]">獎懲</span>
            </button>
            <button onclick="openDiceModal()" class="bg-rose-500 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">🎲</span>
                <span class="text-[10px]">擲骰子</span>
            </button>
        </div>
    </footer>

    <!-- 骰子彈窗 -->
    <div id="diceModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center">
            <div id="diceList" class="flex flex-wrap justify-center gap-2 mb-4"></div>
            <div id="totalDiceScore" class="text-6xl font-black text-rose-500 mb-4">0</div>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="changeDiceCount(1)" class="bg-slate-100 py-2 rounded-lg font-bold text-xs">+ 加顆骰子</button>
                <button onclick="changeDiceCount(-1)" class="bg-slate-100 py-2 rounded-lg font-bold text-xs">- 減顆骰子</button>
            </div>
            <button onclick="reRollAll()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mb-2">重新投擲</button>
            <button onclick="closeDiceModal()" class="w-full bg-slate-200 text-slate-600 py-3 rounded-xl font-bold">返回遊戲</button>
        </div>
    </div>

    <!-- 其他彈窗 (設定, 抽籤結果) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm">
            <h3 id="settingsTitle" class="text-lg font-black text-slate-800 mb-2">設定</h3>
            <textarea id="settingsInput" class="w-full h-40 p-2 border border-slate-200 rounded-lg font-mono text-xs mb-3 outline-none"></textarea>
            <div class="flex gap-2">
                <button onclick="closeSettings()" class="flex-1 bg-slate-100 py-2 rounded-lg text-xs font-bold">取消</button>
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">儲存</button>
            </div>
        </div>
    </div>

    <div id="pickModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center border-4 border-amber-400">
            <div id="pickResult" class="text-xl font-black text-slate-800 min-h-[60px] flex items-center justify-center">...</div>
            <button onclick="document.getElementById('pickModal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold mt-4">確認</button>
        </div>
    </div>

    <script>
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: 0 },
            { id: 'B', name: '壞蛋聯盟', score: 0 }
        ];
        let regularGroups = [
            { id: 1, name: '第一組', score: 0, color: 'bg-blue-500', border: 'border-blue-500' },
            { id: 2, name: '第二組', score: 0, color: 'bg-green-500', border: 'border-green-500' },
            { id: 3, name: '第三組', score: 0, color: 'bg-purple-500', border: 'border-purple-500' },
            { id: 4, name: '第四組', score: 0, color: 'bg-orange-500', border: 'border-orange-500' },
            { id: 5, name: '第五組', score: 0, color: 'bg-pink-500', border: 'border-pink-500' }
        ];

        let students = ["學生A", "學生B", "學生C", "學生D", "學生E"];
        let events = ["🎁 小組 +2", "🎁 個人 +1", "💀 全體 -1", "🎁 全組 +3"];
        let currentSettingType = '';

        function render() {
            // 渲染頂部聯盟
            const teamA = specialGroups[0], teamB = specialGroups[1];
            const isDuel = teamA.score >= 30 && teamB.score >= 30;
            const total = teamA.score + teamB.score;
            const leftW = total > 0 ? (teamA.score / total) * 100 : 50;

            document.getElementById('special-zone').innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-black text-white">${teamA.name}</span>
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('A',2)" class="bg-red-600 text-white w-7 h-7 rounded font-bold text-[10px]">+2</button>
                            <button onclick="scoreSpec('A',1)" class="bg-red-500 text-white w-7 h-7 rounded font-bold text-[10px]">+1</button>
                            <button onclick="scoreSpec('A',-1)" class="bg-slate-700 text-white w-7 h-7 rounded font-bold text-[10px]">-1</button>
                        </div>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-4xl font-black italic text-red-500">${teamA.score}</span>
                        <span class="text-white/20 text-xs font-black italic">VS</span>
                        <span class="text-4xl font-black italic text-blue-500">${teamB.score}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('B',-1)" class="bg-slate-700 text-white w-7 h-7 rounded font-bold text-[10px]">-1</button>
                            <button onclick="scoreSpec('B',1)" class="bg-blue-500 text-white w-7 h-7 rounded font-bold text-[10px]">+1</button>
                            <button onclick="scoreSpec('B',2)" class="bg-blue-600 text-white w-7 h-7 rounded font-bold text-[10px]">+2</button>
                        </div>
                        <span class="text-lg font-black text-white">${teamB.name}</span>
                    </div>
                </div>
                <div class="duel-track">
                    ${isDuel ? `<div class="progress-left" style="width:${leftW}%"></div><div class="progress-right" style="width:${100-leftW}%"></div>` : `<span class="lock-text uppercase tracking-widest">需雙方滿 30 分開啟拉鋸戰</span>`}
                </div>
            `;

            // 渲染下方五組 (按鈕置於最右方)
            const baseScale = 50;
            const maxVal = Math.max(...regularGroups.map(g => g.score), baseScale);
            
            document.getElementById('regular-zone').innerHTML = regularGroups.map(g => `
                <div class="bg-white rounded-xl px-4 py-2 flex items-center justify-between flex-grow shadow-sm border-l-4 ${g.border} min-h-0">
                    <div class="flex flex-col justify-center flex-grow">
                        <div class="flex items-center gap-4">
                            <span class="text-base font-black text-slate-500 truncate w-16">${g.name}</span>
                            <span class="text-4xl font-black text-slate-900 tabular-nums">${g.score}</span>
                        </div>
                        <div class="group-progress-bar w-3/4">
                            <div class="group-progress-fill ${g.color}" style="width: ${Math.min((g.score/maxVal)*100, 100)}%"></div>
                        </div>
                    </div>
                    <!-- 按鈕區：置於最右方 -->
                    <div class="flex items-center gap-1 shrink-0 ml-2">
                        <button onclick="scoreReg(${g.id},-1)" class="bg-slate-100 text-slate-400 w-10 h-10 rounded-xl font-black text-xs border border-slate-200">-1</button>
                        <button onclick="scoreReg(${g.id},1)" class="bg-emerald-500 text-white w-12 h-12 rounded-xl font-black text-base shadow-sm">+1</button>
                        <button onclick="scoreReg(${g.id},2)" class="bg-amber-400 text-white w-12 h-12 rounded-xl font-black text-base shadow-sm">+2</button>
                    </div>
                </div>
            `).join('');
        }

        // 分數邏輯 (零和拉鋸)
        function scoreSpec(tid, d) {
            const tA = specialGroups[0], tB = specialGroups[1];
            const inDuel = tA.score >= 30 && tB.score >= 30;
            if(inDuel) {
                if(tid==='A') { tA.score+=d; tB.score-=d; } else { tB.score+=d; tA.score-=d; }
            } else {
                specialGroups.find(x=>x.id===tid).score += d;
            }
            if(tA.score < 0) tA.score = 0; if(tB.score < 0) tB.score = 0;
            if(!inDuel && tA.score>=30 && tB.score>=30) confetti({particleCount:150, origin:{y:0.3}});
            render();
        }
        function scoreReg(id, d) {
            const g = regularGroups.find(x=>x.id===id);
            g.score += d;
            if(g.score < 0) g.score = 0;
            render();
        }
        function addOneToAllRegular() { regularGroups.forEach(g=>g.score++); render(); }
        function resetAll() { if(confirm('重置所有數據？')) location.reload(); }

        // 骰子邏輯 (新增減少按鈕)
        let curDice = [0];
        function openDiceModal() { 
            if(curDice.length === 0) curDice = [0];
            reRollAll(); 
            document.getElementById('diceModal').classList.remove('hidden'); 
        }
        function changeDiceCount(d) { 
            if(d > 0) curDice.push(0);
            else if(curDice.length > 1) curDice.pop();
            reRollAll(); 
        }
        function reRollAll() {
            const list = document.getElementById('diceList'); list.innerHTML="";
            curDice.forEach((_, i) => {
                const d = document.createElement('div'); d.className="w-12 h-12 bg-white border-2 border-slate-900 rounded-lg flex items-center justify-center font-black text-xl shadow-sm"; d.innerText="?"; list.appendChild(d);
                setTimeout(() => { const v = Math.floor(Math.random()*6)+1; d.innerText=v; curDice[i]=v; document.getElementById('totalDiceScore').innerText = curDice.reduce((a,b)=>a+b,0); }, 200+i*100);
            });
        }
        function closeDiceModal() { document.getElementById('diceModal').classList.add('hidden'); }

        // 計時器
        let timerSeconds = 0, timerInterval = null;
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`; }
        function addTimer(s) { timerSeconds += s; updateT(); }
        function resetTimer() { timerSeconds=0; updateT(); clearInterval(timerInterval); timerInterval=null; document.getElementById('timerToggle').innerText="開始"; }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval=null; document.getElementById('timerToggle').innerText="開始"; }
            else if(timerSeconds>0) { 
                document.getElementById('timerToggle').innerText="暫停";
                timerInterval = setInterval(() => { if(timerSeconds>0){timerSeconds--; updateT();} else {resetTimer(); confetti();} }, 1000); 
            }
        }

        // 抽獎與設定
        function openSettings(t) { currentSettingType=t; document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('settingsInput').value=(t==='students'?students:events).join('\n'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function saveSettings() { const l = document.getElementById('settingsInput').value.split('\n').filter(x=>x.trim()); if(currentSettingType==='students') students=l; else events=l; closeSettings(); }
        function startPick(m) {
            document.getElementById('pickModal').classList.remove('hidden'); let l = m==='student'?students:events;
            let i=0; const it = setInterval(()=>{ document.getElementById('pickResult').innerText=l[Math.floor(Math.random()*l.length)]; if(i++>12){clearInterval(it); confetti({particleCount:40});} }, 80);
        }

        window.onload = render;
    </script>
</body>
</html>
