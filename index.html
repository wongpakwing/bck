<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иӘІе®ӨиЁҲеҲҶжҰң - е…ЁеҠҹиғҪйӣҷиіҪеҲ¶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        #special-zone { height: 230px; shrink: 0; }
        .btn-touch:active { transform: scale(0.92); }
        .track-bg {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 19%, rgba(0,0,0,0.05) 20%);
            background-size: 100% 100%;
        }
        .progress-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 10px; background: rgba(226, 232, 240, 0.5);
        }
        .progress-bar {
            height: 100%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .runner-icon {
            position: absolute; right: 0; top: 50%;
            transform: translate(50%, -60%); font-size: 28px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .special-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-top: 6px solid;
        }
        .member-tag {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            display: inline-block;
            margin: 2px;
        }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden px-2 pt-2 h-screen flex flex-col">
    <!-- й ҒйҰ– -->
    <header class="bg-white/90 backdrop-blur rounded-t-xl px-4 py-2 flex justify-between items-center border-b border-slate-300 shadow-sm shrink-0">
        <div class="flex flex-col">
            <h1 class="font-bold text-slate-800 text-sm">иӘІе®ӨйӣҷиіҪеҲ¶иЁҲеҲҶжҰң</h1>
            <div class="flex gap-2">
                <span class="text-[9px] bg-amber-100 text-amber-700 px-1.5 rounded">зҪ®й Ӯпјҡжӯёйӣ¶жҢ‘жҲ°</span>
                <span class="text-[9px] bg-blue-100 text-blue-700 px-1.5 rounded">дёӢж–№пјҡеёёиҰҸиіҪ (20еҲҶ)</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="editStudents()" class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] border border-slate-300">зёҪеҗҚе–®</button>
            <button onclick="editRewards()" class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] border border-slate-300">зҚҺжҮІжё…е–®</button>
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">еёёиҰҸ+1</button>
            <button onclick="resetAll()" class="bg-slate-400 text-white px-2 py-1 rounded-full text-[10px]">йҮҚзҪ®еҲҶж•ё</button>
        </div>
    </header>

    <!-- зҪ®й Ӯзү№зЁ®з«¶иіҪеҚҖ -->
    <div id="special-zone" class="grid grid-cols-2 gap-2 p-2 bg-slate-800 border-x border-slate-300">
        <!-- JS Render -->
    </div>

    <!-- еёёиҰҸдә”зө„иіҪи·‘еҚҖ - еўһеҠ й«ҳеәҰдҪ”ж»ҝеү©йӨҳз©әй–“ -->
    <div id="regular-zone" class="bg-slate-100 p-2 border-x border-slate-300 grid grid-rows-5 gap-2 flex-1 no-scrollbar overflow-hidden">
        <!-- JS Render -->
    </div>

    <!-- еә•йғЁжҺ§еҲ¶еҸ° - дҪҲеұҖйҮҚзө„ -->
    <footer class="bg-slate-900 rounded-b-xl p-2 flex flex-col gap-2 shrink-0">
        <div class="flex gap-2">
            <!-- е·Ұж–№з©әй–“пјҡжҠҪеӯёз”ҹгҖҒж“ІйӘ°еӯҗ -->
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex flex-col gap-1">
                <div id="pickerDisplay" class="text-amber-400 font-bold text-xs italic truncate mb-1">й»һж“ҠжҠҪдәә/ж“ІйӘ°...</div>
                <div class="flex gap-1">
                    <button onclick="startPick('student')" class="btn-touch flex-1 bg-amber-500 text-white py-2 rounded text-[11px] font-bold">жҠҪеӯёз”ҹ</button>
                    <button onclick="rollDice()" class="btn-touch flex-1 bg-rose-500 text-white py-2 rounded text-[11px] font-bold">рҹҺІ йӘ°еӯҗ+1</button>
                </div>
            </div>
            
            <!-- еҸіж–№з©әй–“пјҡзҚҺжҮІгҖҒеҖ’иЁҲжҷӮ -->
            <div class="flex-1 bg-slate-800 rounded-lg p-2 border border-slate-700 flex flex-col gap-1">
                <div class="flex justify-between items-center mb-1">
                    <button onclick="startPick('reward')" class="btn-touch bg-purple-500 text-white px-3 py-1 rounded text-[11px] font-bold">жҠҪзҚҺжҮІ</button>
                    <div id="timerDisplay" class="font-mono font-black text-xl text-white">00:00</div>
                </div>
                <div class="flex gap-1 items-center">
                    <button onclick="addTimer(10)" class="text-white bg-slate-600 px-1 py-1 rounded text-[9px] flex-1">10s</button>
                    <button onclick="addTimer(30)" class="text-white bg-slate-600 px-1 py-1 rounded text-[9px] flex-1">30s</button>
                    <button onclick="addTimer(60)" class="text-white bg-slate-600 px-1 py-1 rounded text-[9px] flex-1">1m</button>
                    <button onclick="resetTimer()" class="text-white bg-slate-700 px-2 py-1 rounded text-[9px] border border-slate-500">рҹ”„</button>
                    <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-500 text-white px-3 py-1 rounded text-[10px] font-bold">й–Ӣе§Ӣ</button>
                </div>
            </div>
        </div>
    </footer>

    <!-- е…Ёз”ЁеӢ•ж…Ӣ Modal -->
    <div id="mainModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl">
            <h3 id="modalTitle" class="text-slate-400 text-[10px] font-bold mb-4 uppercase italic">жҠҪзұӨдёӯ</h3>
            <div id="modalContent" class="min-h-[120px] flex items-center justify-center bg-slate-50 rounded-xl border-4 border-slate-100 p-2">
                <div id="modalResult" class="text-2xl font-black text-slate-800 px-2 flex flex-wrap justify-center gap-2 w-full">...</div>
            </div>
            <div class="flex gap-2 mt-6">
                <button id="rePickBtn" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-lg font-bold">еҶҚжҠҪдёҖж¬Ў</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-lg font-bold">зўәиӘҚ</button>
            </div>
        </div>
    </div>

    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="timerEndSound" src="https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3"></audio>

    <script>
        let specialGroups = [
            { id: 'A', name: 'еӯёйңёиҒҜзӣҹ', score: -50, color: 'border-red-500', icon: 'рҹҰё', members: ['еӯёз”ҹA1', 'еӯёз”ҹA2'] },
            { id: 'B', name: 'еЈһиӣӢиҒҜзӣҹ', score: 50, color: 'border-blue-500', icon: 'рҹҳҲ', members: ['еӯёз”ҹB1', 'еӯёз”ҹB2'] }
        ];

        let regularGroups = [
            { id: 1, name: 'з¬¬дёҖзө„', score: 0, color: 'border-blue-500', barColor: 'bg-blue-500', icon: 'рҹҡ—' },
            { id: 2, name: 'з¬¬дәҢзө„', score: 0, color: 'border-green-500', barColor: 'bg-green-500', icon: 'рҹҡІ' },
            { id: 3, name: 'з¬¬дёүзө„', score: 0, color: 'border-purple-500', barColor: 'bg-purple-500', icon: 'рҹҸғ' },
            { id: 4, name: 'з¬¬еӣӣзө„', score: 0, color: 'border-orange-500', barColor: 'bg-orange-500', icon: 'рҹҡҖ' },
            { id: 5, name: 'з¬¬дә”зө„', score: 0, color: 'border-pink-500', barColor: 'bg-pink-500', icon: 'вӣө' }
        ];

        let students = ["еӯёз”ҹ1", "еӯёз”ҹ2", "еӯёз”ҹ3", "еӯёз”ҹ4", "еӯёз”ҹ5"];
        let rewards = ["еҠ  1 еҲҶ", "еҠ  2 еҲҶ", "жёӣ 1 еҲҶ", "е…Қжӯ»йҮ‘зүҢ", "иЎЁжј”зҜҖзӣ®", "е°ҸзҰ®зү©", "еқҗеүҚжҺ’"];
        let scoreGoal = 20;
        let diceCount = 1;

        function playSound(isPlus) {
            const sound = document.getElementById(isPlus ? 'plusSound' : 'minusSound');
            if(sound) { sound.volume = 0.3; sound.currentTime = 0; sound.play(); }
        }

        function render() {
            const specialContainer = document.getElementById('special-zone');
            specialContainer.innerHTML = specialGroups.map(g => {
                const isWinner = g.score === 0;
                return `
                    <div class="special-card ${g.color} rounded-xl p-3 flex flex-col justify-between relative shadow-lg overflow-hidden h-full">
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col">
                                <span onclick="renameGroup('${g.id}', true)" class="text-[10px] font-black text-slate-500 border-b border-dotted cursor-pointer uppercase tracking-wider">${g.name}</span>
                                <div onclick="editGroupMembers('${g.id}')" class="mt-1 flex flex-wrap max-h-[40px] overflow-y-auto cursor-pointer">
                                    ${g.members.length > 0 ? g.members.map(m => `<span class="member-tag">${m}</span>`).join('') : '<span class="text-[9px] text-slate-400">й»һж“Ҡж–°еўһ</span>'}
                                </div>
                            </div>
                            <span class="text-2xl">${isWinner ? 'рҹҸҶ' : g.icon}</span>
                        </div>
                        <div class="text-5xl font-black text-center my-1 tabular-nums ${isWinner ? 'text-emerald-500 scale-110' : 'text-slate-800'} transition-all">
                            ${g.score}
                        </div>
                        <div class="flex gap-1 z-10">
                            ${g.id === 'A' ? 
                                `<button onclick="changeSpecialScore('A', 5)" class="flex-1 bg-rose-500 text-white font-bold py-2 rounded-lg text-lg">+5</button>
                                 <button onclick="changeSpecialScore('A', 1)" class="flex-1 bg-rose-400 text-white font-bold py-2 rounded-lg text-lg">+1</button>` :
                                `<button onclick="changeSpecialScore('B', -5)" class="flex-1 bg-blue-500 text-white font-bold py-2 rounded-lg text-lg">-5</button>
                                 <button onclick="changeSpecialScore('B', -1)" class="flex-1 bg-blue-400 text-white font-bold py-2 rounded-lg text-lg">-1</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');

            const regularContainer = document.getElementById('regular-zone');
            regularContainer.innerHTML = regularGroups.map(g => {
                const progress = Math.min(100, (g.score / scoreGoal) * 100);
                const isWinner = g.score >= scoreGoal;
                return `
                    <div class="bg-white border-l-8 ${g.color} rounded-lg shadow-sm px-4 flex flex-col justify-center relative overflow-visible h-full">
                        <div class="absolute inset-0 track-bg opacity-10 pointer-events-none"></div>
                        <div class="flex items-center justify-between z-10">
                            <div onclick="renameGroup(${g.id}, false)" class="w-24 shrink-0 font-black text-slate-600 text-sm border-b border-dotted cursor-pointer">${g.name}</div>
                            <div class="text-5xl font-black text-slate-800 tabular-nums flex-1 text-center">${g.score}</div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="changeRegularScore(${g.id}, 1)" class="btn-touch bg-emerald-500 text-white w-10 h-10 rounded-xl font-black text-xl shadow-sm">+</button>
                                <button onclick="changeRegularScore(${g.id}, -1)" class="btn-touch bg-slate-200 text-slate-500 w-10 h-10 rounded-xl font-black text-xl shadow-sm">-</button>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar ${g.barColor}" style="width: ${progress}%"><span class="runner-icon">${isWinner ? 'рҹҸҶ' : g.icon}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeSpecialScore(id, delta) {
            const g = specialGroups.find(x => x.id === id);
            const old = g.score;
            g.score += delta;
            if (id === 'A' && g.score > 0) g.score = 0;
            if (id === 'B' && g.score < 0) g.score = 0;
            render(); playSound(delta > 0);
            if (g.score === 0 && old !== 0) confetti({ particleCount: 150 });
        }

        function changeRegularScore(id, delta) {
            const g = regularGroups.find(x => x.id === id);
            g.score = Math.max(0, g.score + delta);
            render(); playSound(delta > 0);
            if (g.score >= scoreGoal && delta > 0) confetti({ particleCount: 50 });
        }

        function startPick(mode) {
            const modal = document.getElementById('mainModal');
            const res = document.getElementById('modalResult');
            const title = document.getElementById('modalTitle');
            const rePickBtn = document.getElementById('rePickBtn');
            const pool = mode === 'student' ? students : rewards;
            
            diceCount = 1; 
            title.innerText = mode === 'student' ? 'жҠҪзұӨдёӯ...' : 'зҚҺжҮІжҠҪеҸ–дёӯ...';
            modal.classList.remove('hidden');
            rePickBtn.innerText = "еҶҚжҠҪдёҖж¬Ў";
            rePickBtn.onclick = () => startPick(mode);
            
            let i = 0;
            const itv = setInterval(() => {
                res.innerHTML = `<span>${pool[Math.floor(Math.random()*pool.length)]}</span>`;
                if(i++ > 15) { 
                    clearInterval(itv); 
                    const final = pool[Math.floor(Math.random()*pool.length)];
                    res.innerHTML = `<span>${final}</span>`;
                    if(mode === 'student') document.getElementById('pickerDisplay').innerText = `е·ІжҠҪйҒёпјҡ${final}`;
                    confetti({ particleCount: 80 });
                }
            }, 80);
        }

        function rollDice() {
            const modal = document.getElementById('mainModal');
            const res = document.getElementById('modalResult');
            const rePickBtn = document.getElementById('rePickBtn');
            document.getElementById('modalTitle').innerText = `ж“ІйӘ°еӯҗ (${diceCount} зІ’)...`;
            modal.classList.remove('hidden');
            
            rePickBtn.innerText = "йӘ°еӯҗ +1";
            rePickBtn.onclick = () => { diceCount++; rollDice(); };

            let i = 0;
            const diceIcons = ['вҡҖ', 'вҡҒ', 'вҡӮ', 'вҡғ', 'вҡ„', 'вҡ…'];
            const itv = setInterval(() => {
                let temp = [];
                for(let d=0; d<diceCount; d++) temp.push(diceIcons[Math.floor(Math.random()*6)]);
                res.innerHTML = temp.map(icon => `<span class="text-4xl">${icon}</span>`).join('');
                if(i++ > 10) { 
                    clearInterval(itv); 
                    let final = [];
                    let sum = 0;
                    for(let d=0; d<diceCount; d++) {
                        const val = Math.floor(Math.random()*6)+1;
                        sum += val;
                        final.push(`<div class="bg-white p-2 rounded border border-slate-200"><span class="text-4xl">${diceIcons[val-1]}</span></div>`);
                    }
                    res.innerHTML = `<div class="flex flex-wrap justify-center gap-2">${final.join('')}</div>${diceCount > 1 ? `<div class='w-full mt-2 font-bold text-blue-600 text-sm'>зёҪе’Ң: ${sum}</div>` : ''}`;
                }
            }, 100);
        }

        function closeModal() { document.getElementById('mainModal').classList.add('hidden'); }

        let timerSeconds = 0, timerInterval = null;
        function addTimer(s) { timerSeconds += s; updateTimer(); }
        function resetTimer() { clearInterval(timerInterval); timerInterval = null; timerSeconds = 0; updateTimer(); document.getElementById('timerToggle').innerText="й–Ӣе§Ӣ"; }
        function updateTimer() {
            const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
            const s = (timerSeconds%60).toString().padStart(2,'0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText="з№јзәҢ"; }
            else {
                if (timerSeconds <= 0) return;
                timerInterval = setInterval(() => {
                    if(timerSeconds > 0) { timerSeconds--; updateTimer(); }
                    else { clearInterval(timerInterval); timerInterval=null; document.getElementById('timerEndSound').play(); document.getElementById('timerToggle').innerText="й–Ӣе§Ӣ"; }
                }, 1000);
                document.getElementById('timerToggle').innerText="жҡ«еҒң";
            }
        }

        function editStudents() {
            const list = prompt('еҗҚе–®пјҡ', students.join(', '));
            if (list !== null) students = list.split(/[ ,пјҢ]+/).filter(n => n.trim());
        }
        function editRewards() {
            const list = prompt('зҚҺжҮІпјҡ', rewards.join(', '));
            if (list !== null) rewards = list.split(/[ ,пјҢ]+/).filter(n => n.trim());
        }
        function editGroupMembers(id) {
            const group = specialGroups.find(g => g.id === id);
            const list = prompt(`${group.name} йҡҠе“Ўпјҡ`, group.members.join(', '));
            if (list !== null) { group.members = list.split(/[ ,пјҢ]+/).filter(n => n.trim()); render(); }
        }
        function renameGroup(id, isSpecial) {
            const arr = isSpecial ? specialGroups : regularGroups;
            const group = arr.find(g => g.id === id);
            const newName = prompt('ж–°еҗҚзЁұпјҡ', group.name);
            if (newName) { group.name = newName; render(); }
        }
        function addOneToAllRegular() { regularGroups.forEach(g => g.score++); render(); playSound(true); }
        function resetAll() { if(confirm('йҮҚзҪ®пјҹ')) { specialGroups[0].score = -50; specialGroups[1].score = 50; regularGroups.forEach(g => g.score = 0); render(); } }

        window.onload = render;
    </script>
</body>
</html>
