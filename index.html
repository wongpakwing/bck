<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 精簡版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; background-color: #f1f5f9; }
        
        .timer-giant { font-size: 5rem; line-height: 1; font-weight: 900; letter-spacing: -2px; }
        
        #regular-zone { flex: 1; overflow-y: auto; }
        .btn-touch:active { transform: scale(0.92); }
        
        /* 雙方拉鋸條 */
        .duel-track {
            position: relative; height: 24px; background: #0f172a;
            border-radius: 12px; overflow: hidden; border: 2px solid #334155;
        }
        .progress-left {
            position: absolute; left: 0; height: 100%; background: #ef4444;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-right {
            position: absolute; right: 0; height: 100%; background: #3b82f6;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 骰子動畫 */
        .dice-rolling { animation: dice-shake 0.15s infinite; }
        @keyframes dice-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-5deg); }
            40% { transform: translate(-3px, 0px) rotate(5deg); }
            100% { transform: translate(-1px, 2px) rotate(-5deg); }
        }
        .dice-box {
            width: 70px; height: 70px; background: white; border: 4px solid #1e293b;
            border-radius: 16px; display: flex; items-center; justify-content: center;
            font-size: 40px; font-weight: 900; color: #1e293b;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-3 overflow-hidden">

    <!-- 頂部管理與計時區 -->
    <header class="bg-white rounded-2xl p-4 shadow-md mb-3 flex flex-col items-center">
        <div class="w-full flex justify-between items-center mb-4">
            <div class="flex gap-2">
                <button onclick="toggleConfig('students')" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-xs font-bold border border-slate-200">👤 名單設定</button>
                <button onclick="toggleConfig('events')" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-xs font-bold border border-slate-200">⚙️ 獎懲設定</button>
            </div>
            <div class="flex gap-2">
                <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm">全體 +1</button>
                <button onclick="resetAll()" class="bg-slate-400 text-white px-4 py-2 rounded-xl text-xs font-bold">重置</button>
            </div>
        </div>

        <!-- 巨大倒計時 -->
        <div class="flex flex-col items-center mb-2">
            <div id="timerDisplay" class="timer-giant font-mono text-slate-900 tracking-tighter">00:00</div>
            <div class="flex gap-3 mt-4">
                <button onclick="addTimer(30)" class="bg-slate-800 text-white px-5 py-2 rounded-full text-sm font-bold">+30s</button>
                <button onclick="addTimer(60)" class="bg-slate-800 text-white px-5 py-2 rounded-full text-sm font-bold">+1m</button>
                <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-600 text-white px-8 py-2 rounded-full text-sm font-bold shadow-lg">開始</button>
                <button onclick="resetTimer()" class="bg-slate-200 text-slate-600 px-5 py-2 rounded-full text-sm font-bold">重置</button>
            </div>
        </div>
    </header>

    <!-- 對抗區 (學霸 vs 壞蛋) -->
    <div id="special-zone" class="bg-slate-900 rounded-2xl p-5 mb-3 shadow-inner">
        <!-- JS Render -->
    </div>

    <!-- 常規分組區 -->
    <div id="regular-zone" class="flex flex-col gap-2">
        <!-- JS Render -->
    </div>

    <!-- 底部抽獎/骰子控制台 -->
    <footer class="mt-auto pt-3 grid grid-cols-3 gap-3">
        <button onclick="startPick('student')" class="bg-amber-500 text-white py-4 rounded-2xl font-bold shadow-lg flex flex-col items-center">
            <span class="text-xl">👤</span>
            <span class="text-sm">隨機抽人</span>
        </button>
        <button onclick="startPick('event')" class="bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg flex flex-col items-center">
            <span class="text-xl">🎁</span>
            <span class="text-sm">驚喜獎懲</span>
        </button>
        <button onclick="openDiceModal()" class="bg-rose-500 text-white py-4 rounded-2xl font-bold shadow-lg flex flex-col items-center">
            <span class="text-xl">🎲</span>
            <span class="text-sm">擲骰子</span>
        </button>
    </footer>

    <!-- 彈窗組 (骰子, 抽人) -->
    <div id="diceModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center">
            <div id="diceList" class="flex flex-wrap justify-center gap-3 min-h-[100px] mb-6"></div>
            <div class="text-slate-400 text-xs font-bold mb-1 uppercase">Total Score</div>
            <div id="totalDiceScore" class="text-7xl font-black text-rose-500 mb-6">0</div>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="changeDiceCount(1)" class="bg-slate-100 py-3 rounded-2xl font-bold">+ 🎲</button>
                <button onclick="reRollAll()" class="bg-blue-600 text-white py-3 rounded-2xl font-bold">重新擲</button>
            </div>
            <button onclick="closeDiceModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">確定</button>
        </div>
    </div>

    <div id="pickModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center">
            <div id="pickResult" class="text-3xl font-black text-slate-800 min-h-[100px] flex items-center justify-center">...</div>
            <button onclick="document.getElementById('pickModal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-6">收下</button>
        </div>
    </div>

    <script>
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: 0, color: 'text-red-500' },
            { id: 'B', name: '壞蛋聯盟', score: 0, color: 'text-blue-500' }
        ];
        let regularGroups = [
            { id: 1, name: '第一組', score: 0, border: 'border-blue-500' },
            { id: 2, name: '第二組', score: 0, border: 'border-green-500' },
            { id: 3, name: '第三組', score: 0, border: 'border-purple-500' },
            { id: 4, name: '第四組', score: 0, border: 'border-orange-500' },
            { id: 5, name: '第五組', score: 0, border: 'border-pink-500' }
        ];

        const students = ["學生A", "學生B", "學生C", "學生D", "學生E"];
        const events = ["🎁 獲得星星：小組 +2", "🎁 認真聽講：個人 +1", "💀 鴉雀無聲：全體 -1", "🎁 分享大師：全組 +3"];

        function render() {
            // 頂部聯盟
            const teamA = specialGroups[0]; const teamB = specialGroups[1];
            let total = teamA.score + teamB.score;
            let leftWidth = total > 0 ? (teamA.score / total) * 100 : 50;

            document.getElementById('special-zone').innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <div class="flex flex-col items-start">
                        <span class="text-xl font-black text-white mb-1">${teamA.name}</span>
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('A',2)" class="bg-red-600 text-white w-8 h-8 rounded-lg font-bold text-xs">+2</button>
                            <button onclick="scoreSpec('A',1)" class="bg-red-500 text-white w-8 h-8 rounded-lg font-bold text-xs">+1</button>
                            <button onclick="scoreSpec('A',-1)" class="bg-slate-700 text-white w-8 h-8 rounded-lg font-bold text-xs">-1</button>
                        </div>
                    </div>
                    <div class="text-6xl font-black italic tabular-nums text-red-500">${teamA.score}</div>
                    <div class="mx-4 text-white/20 text-3xl font-black italic">VS</div>
                    <div class="text-6xl font-black italic tabular-nums text-blue-500">${teamB.score}</div>
                    <div class="flex flex-col items-end">
                        <span class="text-xl font-black text-white mb-1">${teamB.name}</span>
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('B',-1)" class="bg-slate-700 text-white w-8 h-8 rounded-lg font-bold text-xs">-1</button>
                            <button onclick="scoreSpec('B',1)" class="bg-blue-500 text-white w-8 h-8 rounded-lg font-bold text-xs">+1</button>
                            <button onclick="scoreSpec('B',2)" class="bg-blue-600 text-white w-8 h-8 rounded-lg font-bold text-xs">+2</button>
                        </div>
                    </div>
                </div>
                <div class="duel-track">
                    <div class="progress-left" style="width: ${leftWidth}%"></div>
                    <div class="progress-right" style="width: ${100 - leftWidth}%"></div>
                </div>
            `;

            // 普通分組 (刪除 Progress Bar, 圖示, 及 5 Group 字樣)
            document.getElementById('regular-zone').innerHTML = regularGroups.map(g => `
                <div class="bg-white rounded-2xl p-4 flex justify-between items-center shadow-sm border-l-8 ${g.border}">
                    <span class="text-xl font-black text-slate-800">${g.name}</span>
                    <div class="flex items-center gap-5">
                        <div class="text-5xl font-black text-slate-900 tabular-nums">${g.score}</div>
                        <div class="flex flex-col gap-1">
                            <div class="flex gap-1">
                                <button onclick="scoreReg(${g.id},2)" class="bg-amber-400 text-white w-12 h-10 rounded-xl font-black">+2</button>
                                <button onclick="scoreReg(${g.id},1)" class="bg-emerald-500 text-white w-12 h-10 rounded-xl font-black">+1</button>
                            </div>
                            <button onclick="scoreReg(${g.id},-1)" class="bg-slate-200 text-slate-500 w-full py-1 rounded-lg font-bold text-xs">-1</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Logic Functions
        function scoreSpec(id, d) { specialGroups.find(x => x.id === id).score += d; render(); }
        function scoreReg(id, d) { regularGroups.find(x => x.id === id).score += d; render(); }
        function addOneToAllRegular() { regularGroups.forEach(g=>g.score++); render(); }
        function resetAll() { if(confirm('確定重置？')) location.reload(); }

        // Timer Logic
        let timerSeconds = 0, timerInterval = null;
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`; }
        function addTimer(s) { timerSeconds += s; updateT(); }
        function resetTimer() { timerSeconds = 0; updateT(); clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText = "開始"; }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timerToggle').innerText = "開始"; }
            else if(timerSeconds > 0) { 
                document.getElementById('timerToggle').innerText = "暫停";
                timerInterval = setInterval(() => { if(timerSeconds > 0) { timerSeconds--; updateT(); } else { resetTimer(); confetti({particleCount:100}); } }, 1000); 
            }
        }

        // Dice & Picker (同前版核心邏輯)
        let curDice = [];
        function openDiceModal() { curDice = [0]; reRollAll(); document.getElementById('diceModal').classList.remove('hidden'); }
        function changeDiceCount(d) { curDice.push(0); reRollAll(); }
        function reRollAll() {
            const list = document.getElementById('diceList'); list.innerHTML = "";
            curDice.forEach((_, i) => {
                const d = document.createElement('div'); d.className="dice-box dice-rolling"; d.innerText="?"; list.appendChild(d);
                setTimeout(() => { 
                    const v = Math.floor(Math.random()*6)+1; d.innerText=v; d.classList.remove('dice-rolling'); curDice[i]=v;
                    document.getElementById('totalDiceScore').innerText = curDice.reduce((a,b)=>a+b,0);
                }, 500 + i*100);
            });
        }
        function closeDiceModal() { document.getElementById('diceModal').classList.add('hidden'); }

        function startPick(mode) {
            const m = document.getElementById('pickModal'); const r = document.getElementById('pickResult');
            m.classList.remove('hidden'); let l = mode==='student'?students:events;
            let i=0; const it = setInterval(()=>{ r.innerText=l[Math.floor(Math.random()*l.length)].split('：')[0]; if(i++>12){ clearInterval(it); r.innerText=l[Math.floor(Math.random()*l.length)]; confetti(); } }, 80);
        }

        function toggleConfig(type) { alert(`已開啟 ${type === 'students' ? '學生名單' : '獎懲'} 設定模式 (此為介面展示)`); }

        window.onload = render;
    </script>
</body>
</html>
