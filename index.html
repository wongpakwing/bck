`
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 零和拉鋸版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; 
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .timer-mini { font-size: 1.8rem; line-height: 1; font-weight: 900; letter-spacing: -1px; }
        .btn-touch:active { transform: scale(0.95); }
        
        /* 雙方拉鋸條 */
        .duel-track {
            position: relative; height: 12px; background: #0f172a;
            border-radius: 6px; overflow: hidden; border: 1px solid #334155;
            display: flex; align-items: center; justify-content: center;
        }
        .progress-left {
            position: absolute; left: 0; height: 100%; background: #ef4444;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-right {
            position: absolute; right: 0; height: 100%; background: #3b82f6;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .lock-text {
            position: relative; z-index: 10; font-size: 9px; font-weight: bold; color: rgba(255,255,255,0.4); text-transform: uppercase;
        }

        /* 小組進度條 */
        .group-progress-bar {
            height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-top: 6px;
        }
        .group-progress-fill {
            height: 100%; transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="p-2 gap-2">

    <!-- 頂部管理區 -->
    <header class="bg-white rounded-xl p-2 shadow-sm flex justify-between items-center shrink-0 border border-slate-100">
        <div class="flex gap-2">
            <button onclick="openSettings('students')" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-slate-200">👤 名單設定</button>
            <button onclick="openSettings('events')" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-slate-200">⚙️ 獎懲設定</button>
        </div>
        <div class="flex gap-2">
            <button onclick="addOneToAllRegular()" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">全體 +1</button>
            <button onclick="resetAll()" class="bg-slate-200 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-bold">重置</button>
        </div>
    </header>

    <!-- 對抗區 (聯盟) -->
    <div id="special-zone" class="bg-slate-900 rounded-xl p-3 shrink-0 shadow-lg">
        <!-- JS 渲染內容 -->
    </div>

    <!-- 常規分組區 -->
    <div id="regular-zone" class="flex flex-col gap-1.5 flex-grow">
        <!-- JS 渲染內容 -->
    </div>

    <!-- 底部綜合控制台 -->
    <footer class="flex gap-2 h-24 shrink-0">
        <!-- 極小化倒計時 -->
        <div class="bg-white rounded-xl p-2 shadow-md flex flex-col items-center justify-center w-40 border border-slate-100">
            <div id="timerDisplay" class="timer-mini font-mono text-slate-900 mb-1">00:00</div>
            <div class="grid grid-cols-2 gap-1 w-full">
                <button onclick="addTimer(10)" class="bg-slate-50 text-slate-600 py-0.5 rounded text-[9px] font-bold border border-slate-200">+10s</button>
                <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-600 text-white py-0.5 rounded text-[9px] font-bold">開始</button>
                <button onclick="addTimer(60)" class="bg-slate-50 text-slate-600 py-0.5 rounded text-[9px] font-bold border border-slate-200">+1m</button>
                <button onclick="resetTimer()" class="bg-slate-100 text-slate-400 py-0.5 rounded text-[9px] font-bold">清零</button>
            </div>
        </div>

        <!-- 隨機按鈕 -->
        <div class="grid grid-cols-3 gap-2 flex-grow">
            <button onclick="startPick('student')" class="bg-amber-500 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">👤</span>
                <span class="text-[10px]">隨機抽人</span>
            </button>
            <button onclick="startPick('event')" class="bg-purple-600 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">🎁</span>
                <span class="text-[10px]">驚喜獎懲</span>
            </button>
            <button onclick="openDiceModal()" class="bg-rose-500 text-white rounded-xl font-bold shadow-md flex flex-col items-center justify-center btn-touch">
                <span class="text-xl">🎲</span>
                <span class="text-[10px]">擲骰子</span>
            </button>
        </div>
    </footer>

    <!-- 設定彈窗 -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm">
            <h3 id="settingsTitle" class="text-lg font-black text-slate-800 mb-2">設定</h3>
            <textarea id="settingsInput" class="w-full h-40 p-2 border border-slate-200 rounded-lg font-mono text-xs mb-3 outline-none focus:border-blue-500"></textarea>
            <div class="flex gap-2">
                <button onclick="closeSettings()" class="flex-1 bg-slate-100 py-2 rounded-lg text-xs font-bold text-slate-500">取消</button>
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">儲存</button>
            </div>
        </div>
    </div>

    <!-- 骰子彈窗 -->
    <div id="diceModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center">
            <div id="diceList" class="flex flex-wrap justify-center gap-2 mb-4"></div>
            <div id="totalDiceScore" class="text-6xl font-black text-rose-500 mb-4">0</div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="changeDiceCount(1)" class="bg-slate-100 py-2 rounded-lg font-bold text-xs">+ 🎲</button>
                <button onclick="reRollAll()" class="bg-blue-600 text-white py-2 rounded-lg font-bold text-xs">重擲</button>
            </div>
            <button onclick="closeDiceModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">返回</button>
        </div>
    </div>

    <!-- 隨機結果 -->
    <div id="pickModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center border-4 border-amber-400 shadow-2xl">
            <div id="pickResult" class="text-xl font-black text-slate-800 min-h-[60px] flex items-center justify-center">...</div>
            <button onclick="document.getElementById('pickModal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold mt-4 shadow-lg">確認</button>
        </div>
    </div>

    <script>
        let specialGroups = [
            { id: 'A', name: '學霸聯盟', score: 0 },
            { id: 'B', name: '壞蛋聯盟', score: 0 }
        ];
        let regularGroups = [
            { id: 1, name: '第一組', score: 0, color: 'bg-blue-500', border: 'border-blue-500' },
            { id: 2, name: '第二組', score: 0, color: 'bg-green-500', border: 'border-green-500' },
            { id: 3, name: '第三組', score: 0, color: 'bg-purple-500', border: 'border-purple-500' },
            { id: 4, name: '第四組', score: 0, color: 'bg-orange-500', border: 'border-orange-500' },
            { id: 5, name: '第五組', score: 0, color: 'bg-pink-500', border: 'border-pink-500' }
        ];

        let students = ["學生A", "學生B", "學生C", "學生D", "學生E"];
        let events = ["🎁 小組 +2", "🎁 個人 +1", "💀 全體 -1", "🎁 全組 +3"];
        let currentSettingType = '';

        function render() {
            // 頂部聯盟渲染
            const teamA = specialGroups[0]; const teamB = specialGroups[1];
            
            // 拉鋸戰門檻檢查
            const duelThreshold = 30;
            const isDuelActive = teamA.score >= duelThreshold && teamB.score >= duelThreshold;
            
            let totalSpec = teamA.score + teamB.score;
            let leftWidth = totalSpec > 0 ? (teamA.score / totalSpec) * 100 : 50;

            document.getElementById('special-zone').innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-black text-white">${teamA.name}</span>
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('A',2)" class="bg-red-600 text-white w-7 h-7 rounded font-bold text-[10px]">+2</button>
                            <button onclick="scoreSpec('A',1)" class="bg-red-500 text-white w-7 h-7 rounded font-bold text-[10px]">+1</button>
                            <button onclick="scoreSpec('A',-1)" class="bg-slate-700 text-white w-7 h-7 rounded font-bold text-[10px]">-1</button>
                        </div>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-4xl font-black italic text-red-500 tabular-nums">${teamA.score}</span>
                        <span class="text-white/20 text-xs italic font-black">VS</span>
                        <span class="text-4xl font-black italic text-blue-500 tabular-nums">${teamB.score}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1">
                            <button onclick="scoreSpec('B',-1)" class="bg-slate-700 text-white w-7 h-7 rounded font-bold text-[10px]">-1</button>
                            <button onclick="scoreSpec('B',1)" class="bg-blue-500 text-white w-7 h-7 rounded font-bold text-[10px]">+1</button>
                            <button onclick="scoreSpec('B',2)" class="bg-blue-600 text-white w-7 h-7 rounded font-bold text-[10px]">+2</button>
                        </div>
                        <span class="text-lg font-black text-white">${teamB.name}</span>
                    </div>
                </div>
                <div class="duel-track">
                    ${isDuelActive ? `
                        <div class="progress-left" style="width: ${leftWidth}%"></div>
                        <div class="progress-right" style="width: ${100-leftWidth}%"></div>
                    ` : `
                        <span class="lock-text">需雙方滿 30 分開啟拉鋸戰</span>
                    `}
                </div>
            `;

            // 普通分組渲染 (分數置中對齊)
            const baseScale = 50;
            const maxVal = Math.max(...regularGroups.map(g => g.score), baseScale);
            
            document.getElementById('regular-zone').innerHTML = regularGroups.map(g => `
                <div class="bg-white rounded-xl p-2 flex flex-col flex-grow shadow-sm border-b-4 ${g.border} min-h-0">
                    <div class="flex flex-col items-center justify-center h-full gap-1">
                        <span class="text-base font-black text-slate-800">${g.name}</span>
                        <div class="flex items-center gap-6">
                            <div class="flex gap-1">
                                <button onclick="scoreReg(${g.id},-1)" class="bg-slate-100 text-slate-400 w-8 h-8 rounded-lg font-black text-[10px]">-1</button>
                            </div>
                            <div class="text-4xl font-black text-slate-900 tabular-nums leading-none min-w-[3rem] text-center">${g.score}</div>
                            <div class="flex gap-1">
                                <button onclick="scoreReg(${g.id},1)" class="bg-emerald-500 text-white w-9 h-8 rounded-lg font-black text-xs">+1</button>
                                <button onclick="scoreReg(${g.id},2)" class="bg-amber-400 text-white w-9 h-8 rounded-lg font-black text-xs">+2</button>
                            </div>
                        </div>
                        <div class="group-progress-bar w-full max-w-md">
                            <div class="group-progress-fill ${g.color}" style="width: ${Math.min((g.score/maxVal)*100, 100)}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 分數功能 (包含拉鋸戰零和邏輯)
        function scoreSpec(targetId, delta) { 
            const teamA = specialGroups[0];
            const teamB = specialGroups[1];
            const threshold = 30;
            
            // 檢查在操作前是否已經處於拉鋸戰狀態
            const alreadyInDuel = teamA.score >= threshold && teamB.score >= threshold;

            if (alreadyInDuel) {
                // 零和邏輯：一方加，另一方減；一方減，另一方加
                if (targetId === 'A') {
                    teamA.score += delta;
                    teamB.score -= delta;
                } else {
                    teamB.score += delta;
                    teamA.score -= delta;
                }
            } else {
                // 一般加減分邏輯
                const target = specialGroups.find(x => x.id === targetId);
                target.score += delta;
            }

            // 安全檢查：分數不低於 0
            if (teamA.score < 0) teamA.score = 0;
            if (teamB.score < 0) teamB.score = 0;

            // 剛進入拉鋸戰時灑花
            if (!alreadyInDuel && teamA.score >= threshold && teamB.score >= threshold) {
                confetti({particleCount: 200, spread: 90, origin: { y: 0.3 }});
            }
            
            render(); 
        }

        function scoreReg(id, d) { 
            const group = regularGroups.find(x=>x.id===id);
            group.score += d;
            if (group.score < 0) group.score = 0;
            render(); 
        }

        function addOneToAllRegular() { regularGroups.forEach(g=>g.score++); render(); }
        function resetAll() { if(confirm('確定要清除所有組別分數並重置嗎？')) location.reload(); }

        // 設定
        function openSettings(type) {
            currentSettingType = type;
            const m = document.getElementById('settingsModal');
            document.getElementById('settingsTitle').innerText = type==='students'?'👤 抽人名單設定':'⚙️ 獎懲文字設定';
            document.getElementById('settingsInput').value = (type==='students'?students:events).join('\n');
            m.classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function saveSettings() {
            const lines = document.getElementById('settingsInput').value.split('\n').filter(l=>l.trim()!=='');
            if(currentSettingType==='students') students = lines; else events = lines;
            closeSettings();
        }

        // 計時器
        let timerSeconds = 0, timerInterval = null;
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(timerSeconds/60).toString().padStart(2,'0')}:${(timerSeconds%60).toString().padStart(2,'0')}`; }
        function addTimer(s) { timerSeconds += s; updateT(); }
        function resetTimer() { timerSeconds=0; updateT(); clearInterval(timerInterval); timerInterval=null; document.getElementById('timerToggle').innerText="開始"; }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval=null; document.getElementById('timerToggle').innerText="開始"; }
            else if(timerSeconds>0) { 
                document.getElementById('timerToggle').innerText="暫停";
                timerInterval = setInterval(() => { if(timerSeconds>0){timerSeconds--; updateT();} else {resetTimer(); confetti({particleCount:150, spread:70, origin:{y:0.6}});} }, 1000); 
            }
        }

        // 骰子
        let curDice = [];
        function openDiceModal() { curDice=[0]; reRollAll(); document.getElementById('diceModal').classList.remove('hidden'); }
        function changeDiceCount(d) { curDice.push(0); reRollAll(); }
        function reRollAll() {
            const list = document.getElementById('diceList'); list.innerHTML="";
            curDice.forEach((_, i) => {
                const d = document.createElement('div'); d.className="w-12 h-12 bg-white border-2 border-slate-900 rounded-lg flex items-center justify-center font-black text-xl shadow-inner"; d.innerText="?"; list.appendChild(d);
                setTimeout(() => { const v = Math.floor(Math.random()*6)+1; d.innerText=v; curDice[i]=v; document.getElementById('totalDiceScore').innerText = curDice.reduce((a,b)=>a+b,0); }, 300+i*100);
            });
        }
        function closeDiceModal() { document.getElementById('diceModal').classList.add('hidden'); }

        // 抽獎
        function startPick(mode) {
            const m = document.getElementById('pickModal'); const r = document.getElementById('pickResult');
            m.classList.remove('hidden'); let l = mode==='student'?students:events;
            let i=0; const it = setInterval(()=>{ r.innerText=l[Math.floor(Math.random()*l.length)]; if(i++>12){clearInterval(it); confetti({particleCount:50});} }, 80);
        }

        window.onload = render;
    </script>
</body>
</html>
