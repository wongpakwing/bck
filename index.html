<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 專業功能版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin:0; padding:4px; box-sizing: border-box; }
        
        .shard-icon { font-size: 11px; cursor: pointer; filter: grayscale(100%) opacity(30%); padding: 2px 6px; border-radius: 6px; background: rgba(0,0,0,0.05); border: 1px solid transparent; display: inline-flex; align-items: center; user-select: none; }
        .shard-icon.active { filter: grayscale(0%) opacity(100%) !important; background: #ffffff !important; border-color: #fbbf24; color: #b45309; font-weight: bold; }
        
        .shield-btn { cursor: pointer; filter: opacity(20%); font-size: 18px; user-select: none; }
        .shield-btn.active { filter: opacity(100%) drop-shadow(0 0 4px #3b82f6); }
        
        .duel-track { position: relative; height: 10px; background: #0f172a; border-radius: 5px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-left { position: absolute; left: 0; height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-right { position: absolute; right: 0; height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 拉鋸戰模式動畫 */
        .tug-of-war-active { animation: pulse-border 1.5s infinite; }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0px #f43f5e; }
            50% { box-shadow: 0 0 15px #f43f5e; }
        }

        .score-btn { width: 44px; height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: transform 0.1s; }
        .score-btn:active { transform: scale(0.9); }

        .dice-box { width: 50px; height: 50px; border: 3px solid #334155; border-radius: 12px; display: flex; items-center; justify-center; font-size: 24px; font-weight: 900; background: white; }
        .dice-rolling { animation: dice-shake 0.1s infinite; }
        @keyframes dice-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-5deg); }
            100% { transform: translate(1px, 2px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <header class="bg-white rounded-xl p-2 shadow-sm flex justify-between items-center shrink-0 border border-slate-200 mb-1">
        <div class="flex gap-1">
            <button onclick="openSettings('students')" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[11px] font-bold">👤 學生</button>
            <button onclick="openSettings('events')" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[11px] font-bold">⚙️ 獎勵</button>
            <button onclick="openSettings('shards')" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[11px] font-bold">🧩 碎片</button>
        </div>
        <div class="flex items-center gap-1">
            <span id="syncStatus" class="text-[9px] text-slate-400 mr-2">● 正在連線</span>
            <button onclick="addScoreToAll(1)" class="bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-[11px] font-bold">全體+1</button>
            <button onclick="resetData()" class="bg-slate-200 text-slate-500 px-3 py-1.5 rounded-lg text-[11px] font-bold">重置數據</button>
        </div>
    </header>

    <!-- 特殊組別 (具備拉鋸戰邏輯) -->
    <div id="special-zone" class="bg-slate-900 rounded-xl p-3 shrink-0 shadow-lg text-white mb-1 transition-all duration-500">
        <!-- JS 填充 -->
    </div>
    
    <!-- 常規組別 -->
    <div id="regular-zone" class="flex flex-col gap-1.5 flex-grow overflow-y-auto mb-1 px-1">
        <!-- JS 填充 -->
    </div>

    <!-- 底部控制 -->
    <footer class="flex gap-1.5 h-16 shrink-0 mt-auto">
        <div class="bg-white rounded-xl p-1 shadow-md flex flex-col items-center justify-center w-32 border border-slate-200">
            <div id="timerDisplay" class="text-xl font-black font-mono text-slate-900 leading-none mb-1">00:00</div>
            <div class="grid grid-cols-3 gap-1 w-full">
                <button onclick="addTimer(60)" class="bg-blue-50 text-blue-600 py-0.5 rounded text-[9px] font-bold border">+1m</button>
                <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-600 text-white py-0.5 rounded text-[9px] font-bold">開始</button>
                <button onclick="clearTimer()" class="bg-slate-100 text-slate-400 py-0.5 rounded text-[9px] font-bold border">清零</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1.5 flex-grow">
            <button onclick="startPick('student')" class="bg-amber-500 text-white rounded-xl font-bold flex flex-col items-center justify-center shadow-sm">
                <span class="text-xl">👤</span><span class="text-[10px]">抽人</span>
            </button>
            <button onclick="startPick('event')" class="bg-purple-600 text-white rounded-xl font-bold flex flex-col items-center justify-center shadow-sm">
                <span class="text-xl">🎁</span><span class="text-[10px]">獎勵</span>
            </button>
            <button onclick="startPick('shard')" class="bg-sky-500 text-white rounded-xl font-bold flex flex-col items-center justify-center shadow-sm">
                <span class="text-xl">🧩</span><span class="text-[10px]">碎片</span>
            </button>
            <button onclick="openDiceModal()" class="bg-rose-500 text-white rounded-xl font-bold flex flex-col items-center justify-center shadow-sm">
                <span class="text-xl">🎲</span><span class="text-[10px]">骰子</span>
            </button>
        </div>
    </footer>

    <!-- 各種彈窗 (與之前相同，僅骰子視窗更新) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 text-slate-800">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm">
            <h3 id="settingsTitle" class="text-lg font-black mb-2">編輯</h3>
            <textarea id="settingsInput" class="w-full h-48 p-3 border border-slate-200 rounded-xl font-mono text-sm mb-4 outline-none"></textarea>
            <div class="flex gap-2">
                <button onclick="closeModal('settingsModal')" class="flex-1 bg-slate-100 py-2.5 rounded-lg text-sm font-bold text-slate-400">取消</button>
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg text-sm font-bold">儲存</button>
            </div>
        </div>
    </div>

    <div id="pickModal" class="hidden fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4 text-slate-800">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center border-4 border-amber-400 shadow-2xl">
            <div id="pickResult" class="text-3xl font-black min-h-[80px] flex items-center justify-center leading-tight">...</div>
            <button onclick="closeModal('pickModal')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-6">確認</button>
        </div>
    </div>

    <!-- 多骰子彈窗 -->
    <div id="diceModal" class="hidden fixed inset-0 bg-black/80 z-[130] flex items-center justify-center p-4 text-slate-800">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center border-4 border-rose-400 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="text-slate-400 text-xs font-bold">骰子數量</div>
                <div class="flex items-center gap-3">
                    <button onclick="adjustDice(-1)" class="w-8 h-8 bg-slate-100 rounded-full font-bold">-</button>
                    <span id="diceCount" class="font-black text-lg">1</span>
                    <button onclick="adjustDice(1)" class="w-8 h-8 bg-slate-100 rounded-full font-bold">+</button>
                </div>
            </div>
            <div id="diceContainer" class="flex flex-wrap justify-center gap-2 min-h-[120px] items-center mb-4">
                <!-- 骰子內容 -->
            </div>
            <div class="text-slate-400 text-[10px] uppercase font-bold mb-1">總點數</div>
            <div id="diceTotal" class="text-5xl font-black text-rose-500 mb-6">0</div>
            <button id="rollBtn" onclick="rollAllDice()" class="w-full bg-rose-500 text-white py-4 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-transform">擲骰子！</button>
            <button onclick="closeModal('diceModal')" class="w-full bg-slate-100 text-slate-400 py-3 rounded-2xl font-bold mt-4">關閉</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/085cbfd3a843d7d7df1a';

        const DEFAULT_STATE = {
            specialGroups: [
                { id: 'A', name: '學霸聯盟', score: 0, shards: [false,false,false,false], shield: false }, 
                { id: 'B', name: '壞蛋聯盟', score: 0, shards: [false,false,false,false], shield: false }
            ],
            regularGroups: [
                { id: 1, name: '第一組', score: 0, shards: [false,false,false,false], shield: false },
                { id: 2, name: '第二組', score: 0, shards: [false,false,false,false], shield: false },
                { id: 3, name: '第三組', score: 0, shards: [false,false,false,false], shield: false },
                { id: 4, name: '第四組', score: 0, shards: [false,false,false,false], shield: false },
                { id: 5, name: '第五組', score: 0, shards: [false,false,false,false], shield: false }
            ],
            students: ["學生1", "學生2", "學生3"],
            events: ["好表現 +1", "幫助他人 +2"],
            shards: ["🧩 碎片1", "🧩 碎片2", "🧩 碎片3", "🧩 碎片4"]
        };

        let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

        async function loadData() {
            const statusEl = document.getElementById('syncStatus');
            try {
                const res = await fetch(API_URL);
                if (res.ok) {
                    const cloud = await res.json();
                    if (cloud && cloud.regularGroups) {
                        state = { ...DEFAULT_STATE, ...cloud };
                        statusEl.innerText = "● 已連線";
                    }
                }
            } catch (e) { statusEl.innerText = "● 離線模式"; }
            render();
        }

        async function saveData() {
            document.getElementById('syncStatus').innerText = "○ 同步中...";
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
                document.getElementById('syncStatus').innerText = "● 已同步";
            } catch (e) { document.getElementById('syncStatus').innerText = "× 同步失敗"; }
        }

        function render() {
            try {
                const sA = state.specialGroups[0], sB = state.specialGroups[1];
                const isTugOfWar = sA.score >= 30 || sB.score >= 30;
                const total = sA.score + sB.score;
                const leftW = total > 0 ? (sA.score / total) * 100 : 50;
                
                const specialZone = document.getElementById('special-zone');
                if (isTugOfWar) specialZone.classList.add('tug-of-war-active');
                else specialZone.classList.remove('tug-of-war-active');

                specialZone.innerHTML = `
                    <div class="flex items-center justify-center mb-2">
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-white/10 uppercase tracking-widest">
                            ${isTugOfWar ? '🔥 拉鋸戰模式 (互相消減) 🔥' : '聯盟對抗賽'}
                        </span>
                    </div>
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col gap-1.5 flex-1">
                            <span class="text-[11px] font-bold text-red-400" onclick="editName('special','A')">${sA.name} ✎</span>
                            <div class="flex items-center gap-1.5">
                                <div class="flex gap-1">${sA.shards.map((s,i)=>`<div onclick="toggleShard('special','A',${i})" class="shard-icon ${s?'active':''}">🧩${i+1}</div>`).join('')}</div>
                                <span onclick="toggleShield('special','A')" class="shield-btn ${sA.shield?'active':''}">🛡️</span>
                            </div>
                            <div class="flex gap-1.5 mt-2">
                                <button onclick="addSpecialScore('A',1)" class="score-btn bg-red-500 rounded-lg text-xs">+1</button>
                                <button onclick="addSpecialScore('A',2)" class="score-btn bg-red-600 rounded-lg text-xs">+2</button>
                                <button onclick="addSpecialScore('A',-1)" class="score-btn bg-slate-700 rounded-lg text-xs">-1</button>
                            </div>
                        </div>
                        <div class="px-4 text-center">
                            <div class="flex items-center gap-2">
                                <span class="text-4xl font-black italic text-red-500" onclick="modifyScore('special','A')">${sA.score}</span>
                                <span class="text-[10px] opacity-20 italic">VS</span>
                                <span class="text-4xl font-black italic text-blue-500" onclick="modifyScore('special','B')">${sB.score}</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1 items-end text-right">
                            <span class="text-[11px] font-bold text-blue-400" onclick="editName('special','B')">${sB.name} ✎</span>
                            <div class="flex items-center gap-1.5">
                                <span onclick="toggleShield('special','B')" class="shield-btn ${sB.shield?'active':''}">🛡️</span>
                                <div class="flex gap-1">${sB.shards.map((s,i)=>`<div onclick="toggleShard('special','B',${i})" class="shard-icon ${s?'active':''}">🧩${i+1}</div>`).join('')}</div>
                            </div>
                            <div class="flex gap-1.5 mt-2">
                                <button onclick="addSpecialScore('B',-1)" class="score-btn bg-slate-700 rounded-lg text-xs">-1</button>
                                <button onclick="addSpecialScore('B',2)" class="score-btn bg-blue-600 rounded-lg text-xs">+2</button>
                                <button onclick="addSpecialScore('B',1)" class="score-btn bg-blue-500 rounded-lg text-xs">+1</button>
                            </div>
                        </div>
                    </div>
                    <div class="duel-track"><div class="progress-left" style="width: ${leftW}%"></div><div class="progress-right" style="width: ${100-leftW}%"></div></div>
                `;

                document.getElementById('regular-zone').innerHTML = state.regularGroups.map(g => `
                    <div class="bg-white rounded-2xl p-2 flex items-center justify-between shadow-sm border border-slate-100">
                        <div class="flex flex-col flex-1 min-w-0">
                            <span class="text-[11px] font-bold text-slate-400 truncate" onclick="editName('regular',${g.id})">${g.name} ✎</span>
                            <div class="flex items-center gap-1.5">
                                <div class="flex gap-1">${g.shards.map((s,i)=>`<div onclick="toggleShard('regular',${g.id},${i})" class="shard-icon ${s?'active':''}">🧩${i+1}</div>`).join('')}</div>
                                <span onclick="toggleShield('regular',${g.id})" class="shield-btn ${g.shield?'active':''}">🛡️</span>
                            </div>
                        </div>
                        <div class="flex-grow text-center px-2">
                            <span class="text-3xl font-black text-slate-900" onclick="modifyScore('regular',${g.id})">${g.score}</span>
                        </div>
                        <div class="flex gap-1.5 ml-2 shrink-0">
                            <button onclick="addScore('regular',${g.id},1)" class="score-btn bg-emerald-500 text-white rounded-xl text-xl">+1</button>
                            <button onclick="addScore('regular',${g.id},2)" class="score-btn bg-emerald-600 text-white rounded-xl text-xl">+2</button>
                            <button onclick="addScore('regular',${g.id},-1)" class="score-btn bg-slate-100 text-slate-400 rounded-xl text-xl border">-1</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        // 分數邏輯 (含拉鋸戰)
        function addSpecialScore(targetId, val) {
            const sA = state.specialGroups[0];
            const sB = state.specialGroups[1];
            const isTugOfWar = sA.score >= 30 || sB.score >= 30;

            if (targetId === 'A') {
                sA.score = Math.max(0, sA.score + val);
                if (isTugOfWar && val > 0) sB.score = Math.max(0, sB.score - val); // 拉鋸戰：A加則B減
            } else {
                sB.score = Math.max(0, sB.score + val);
                if (isTugOfWar && val > 0) sA.score = Math.max(0, sA.score - val); // 拉鋸戰：B加則A減
            }
            render(); saveData();
        }

        function addScore(type, id, val) {
            const grp = type === 'special' ? state.specialGroups.find(g => g.id === id) : state.regularGroups.find(g => g.id == id);
            if (grp) { grp.score = Math.max(0, grp.score + val); render(); saveData(); }
        }

        // 骰子系統
        let diceCount = 1;
        let currentDiceValues = [1];
        function openDiceModal() {
            document.getElementById('diceModal').classList.remove('hidden');
            renderDice();
        }
        function adjustDice(v) {
            diceCount = Math.max(1, Math.min(6, diceCount + v));
            document.getElementById('diceCount').innerText = diceCount;
            currentDiceValues = Array(diceCount).fill('🎲');
            renderDice();
        }
        function renderDice() {
            const container = document.getElementById('diceContainer');
            container.innerHTML = currentDiceValues.map(v => `<div class="dice-box">${v}</div>`).join('');
            const total = currentDiceValues.every(v => typeof v === 'number') ? currentDiceValues.reduce((a,b)=>a+b,0) : 0;
            document.getElementById('diceTotal').innerText = total;
        }
        function rollAllDice() {
            const boxes = document.querySelectorAll('.dice-box');
            const btn = document.getElementById('rollBtn');
            btn.disabled = true;
            boxes.forEach(b => b.classList.add('dice-rolling'));
            
            let ticks = 0;
            const timer = setInterval(() => {
                currentDiceValues = currentDiceValues.map(() => Math.floor(Math.random() * 6) + 1);
                renderDice();
                if (ticks++ > 15) {
                    clearInterval(timer);
                    btn.disabled = false;
                    document.querySelectorAll('.dice-box').forEach(b => b.classList.remove('dice-rolling'));
                    confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
                }
            }, 60);
        }

        // 計時器工具
        let tSec = 0, tInt = null;
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(tSec/60).toString().padStart(2,'0')}:${(tSec%60).toString().padStart(2,'0')}`; }
        function addTimer(s) { tSec += s; updateT(); }
        function clearTimer() { tSec = 0; if(tInt) toggleTimer(); updateT(); }
        function toggleTimer() {
            if (tInt) { clearInterval(tInt); tInt = null; document.getElementById('timerToggle').innerText = "開始"; }
            else if (tSec > 0) {
                document.getElementById('timerToggle').innerText = "暫停";
                tInt = setInterval(() => { if (tSec > 0) { tSec--; updateT(); } else { clearInterval(tInt); tInt = null; confetti(); } }, 1000);
            }
        }

        // 其他通用功能
        function toggleShard(type, id, idx) {
            const grp = type === 'special' ? state.specialGroups.find(g => g.id === id) : state.regularGroups.find(g => g.id == id);
            if (grp) { grp.shards[idx] = !grp.shards[idx]; render(); saveData(); }
        }
        function toggleShield(type, id) {
            const grp = type === 'special' ? state.specialGroups.find(g => g.id === id) : state.regularGroups.find(g => g.id == id);
            if (grp) { grp.shield = !grp.shield; render(); saveData(); }
        }
        function addScoreToAll(v) { state.regularGroups.forEach(g => g.score += v); render(); saveData(); }
        function resetData() { if(confirm("確定清空全體分數與數據？")){ state = JSON.parse(JSON.stringify(DEFAULT_STATE)); render(); saveData(); } }
        function editName(type, id) { 
            const grp = type === 'special' ? state.specialGroups.find(g => g.id === id) : state.regularGroups.find(g => g.id == id);
            const n = prompt("輸入新名稱", grp.name); if(n) { grp.name = n; render(); saveData(); }
        }
        function modifyScore(type, id) {
            const grp = type === 'special' ? state.specialGroups.find(g => g.id === id) : state.regularGroups.find(g => g.id == id);
            const n = prompt("直接修改分數", grp.score); if(n !== null) { grp.score = parseInt(n) || 0; render(); saveData(); }
        }
        function openSettings(m) {
            activeMode = m;
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('settingsTitle').innerText = m === 'students' ? '👤 編輯學生' : (m === 'events' ? '🎁 編輯獎勵' : '🧩 編輯碎片');
            document.getElementById('settingsInput').value = (state[m] || []).join('\n');
        }
        function saveSettings() {
            state[activeMode] = document.getElementById('settingsInput').value.split('\n').filter(l => l.trim());
            closeModal('settingsModal'); saveData();
        }
        function startPick(mode) {
            const list = mode === 'student' ? state.students : (mode === 'event' ? state.events : state.shards);
            if (!list || list.length === 0) { alert("名單為空！"); return; }
            document.getElementById('pickModal').classList.remove('hidden');
            let i = 0;
            const timer = setInterval(() => {
                document.getElementById('pickResult').innerText = list[Math.floor(Math.random() * list.length)];
                if (i++ > 15) { clearInterval(timer); confetti({ spread: 70, origin: { y: 0.6 } }); }
            }, 60);
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = loadData;
    </script>
</body>
</html>
