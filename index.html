<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室計分榜 - 手動同步穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        #scoreboard { 
            grid-template-rows: repeat(7, 1fr); 
            height: calc(100vh - 120px); 
            min-height: 500px;
        }
        .group-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-touch:active { transform: scale(0.9); }
        
        @keyframes save-flash {
            0% { opacity: 0; transform: translateY(5px); }
            50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-5px); }
        }
        .save-indicator {
            animation: save-flash 1.5s ease-in-out forwards;
        }

        .sync-loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden p-2">
    <header class="bg-white rounded-xl shadow-sm px-3 py-2 mb-2 flex justify-between items-center relative border-b-2 border-slate-200">
        <div class="flex items-center gap-3">
            <div>
                <h1 class="font-bold text-slate-800 text-sm">課室計分榜 (手動同步)</h1>
                <div id="syncStatus" class="text-[9px] text-slate-400 font-medium">本地數據就緒</div>
            </div>
            <div id="saveStatus" class="text-[10px] text-blue-600 font-bold opacity-0">● 雲端已更新</div>
        </div>
        <div class="flex gap-2">
            <!-- 新增手動同步按鈕 -->
            <button id="syncBtn" onclick="manualSync()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-lg text-xs font-bold transition flex items-center gap-1 shadow-md">
                <svg id="syncIcon" xmlns="http://www.w3.org/2003/svg" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                同步數據
            </button>
            <button onclick="addOneToAll()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-3 py-1 rounded-lg text-xs font-bold transition">全體 +1</button>
            <button onclick="resetScores()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1 rounded-lg text-xs font-medium transition">重置</button>
        </div>
    </header>

    <div id="scoreboard" class="grid grid-cols-1 gap-1"></div>

    <audio id="plusSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="minusSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script>
        const JSON_BIN_ID = '085cbfd3a843d7d7df1a'; 
        const API_URL = `https://api.npoint.io/${JSON_BIN_ID}`;

        const defaultGroups = [
            { id: 101, name: '第一直行', score: 0, color: 'border-blue-500 bg-blue-50' },
            { id: 102, name: '第二直行', score: 0, color: 'border-green-500 bg-green-50' },
            { id: 103, name: '第三直行', score: 0, color: 'border-purple-500 bg-purple-50' },
            { id: 104, name: '第四直行', score: 0, color: 'border-orange-500 bg-orange-50' },
            { id: 105, name: '第五直行', score: 0, color: 'border-pink-500 bg-pink-50' },
            { id: 106, name: '🦸‍♂️超人聯盟', score: -50, color: 'border-cyan-500 bg-cyan-50' },
            { id: 107, name: '😈壞蛋聯盟', score: 50, color: 'border-indigo-500 bg-indigo-50' }
        ];

        let groups = [];
        let isSyncing = false;
        let localChanged = false; // 追蹤是否有未同步的更改

        // 1. 手動同步按鈕邏輯：先下載最新，再合併本地，最後上傳
        async function manualSync() {
            if (isSyncing) return;
            setSyncingUI(true);
            updateStatus("正在同步...", "text-blue-500");

            try {
                // 1. 先從雲端抓取最新數據（防止多台設備衝突）
                const fetchRes = await fetch(`${API_URL}?t=${Date.now()}`, { cache: "no-store" });
                if (!fetchRes.ok) throw new Error("Fetch Failed");
                const cloudData = await fetchRes.json();

                // 2. 如果本地有改動，就以本地為主上傳；如果本地剛開啟沒改動，就以下載的為主
                if (!localChanged && Array.isArray(cloudData) && cloudData.length === 7) {
                    groups = cloudData;
                    render();
                }

                // 3. 上傳當前數據到雲端
                const saveRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(groups)
                });

                if (saveRes.ok) {
                    localChanged = false;
                    showSaveIndicator();
                    updateStatus("同步成功", "text-emerald-600");
                } else {
                    throw new Error("Save Failed");
                }
            } catch (e) {
                console.error(e);
                updateStatus("同步延遲，請重試", "text-rose-500");
            } finally {
                setTimeout(() => setSyncingUI(false), 500);
            }
        }

        function setSyncingUI(syncing) {
            isSyncing = syncing;
            const btn = document.getElementById('syncBtn');
            const icon = document.getElementById('syncIcon');
            if (syncing) {
                btn.classList.add('opacity-70');
                icon.classList.add('sync-loading');
            } else {
                btn.classList.remove('opacity-70');
                icon.classList.remove('sync-loading');
            }
        }

        function updateStatus(msg, colorClass) {
            const el = document.getElementById('syncStatus');
            el.innerText = msg + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            el.className = `text-[9px] font-medium ${colorClass}`;
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveStatus');
            indicator.classList.remove('save-indicator');
            void indicator.offsetWidth; 
            indicator.classList.add('save-indicator');
        }

        function playSound(isPlus) {
            const sound = document.getElementById(isPlus ? 'plusSound' : 'minusSound');
            if (sound) {
                sound.volume = 0.15; 
                sound.currentTime = 0;
                sound.play().catch(() => {});
            }
        }

        window.changeScore = (id, delta) => {
            const group = groups.find(g => g.id === id);
            if (group) {
                group.score += delta;
                localChanged = true;
                render();
                playSound(delta > 0);
                updateStatus("本地已更改，請按同步", "text-amber-500");
                localStorage.setItem('classroom_scores_final_v7', JSON.stringify(groups));
            }
        };

        window.addOneToAll = () => {
            groups.forEach(g => g.score += 1);
            localChanged = true;
            render();
            playSound(true);
            updateStatus("本地已更改，請按同步", "text-amber-500");
            localStorage.setItem('classroom_scores_final_v7', JSON.stringify(groups));
        };

        window.resetScores = () => {
            if (confirm('確定要將本地分數重置嗎？(需手動點擊同步才會更新雲端)')) {
                groups = JSON.parse(JSON.stringify(defaultGroups));
                localChanged = true;
                render();
                updateStatus("本地已重置，請按同步", "text-amber-500");
                localStorage.setItem('classroom_scores_final_v7', JSON.stringify(groups));
            }
        };

        function render() {
            const container = document.getElementById('scoreboard');
            if (!container) return;
            const sortedGroups = [...groups].sort((a, b) => b.score - a.score);

            container.innerHTML = sortedGroups.map((group) => `
                <div id="group-${group.id}" class="group-card border-t-2 ${group.color} rounded-lg shadow-sm p-1.5 flex flex-row items-center justify-between relative overflow-hidden h-full">
                    <div class="flex flex-col items-start justify-center pl-1">
                        <h2 class="text-xl font-black text-slate-700 leading-none tracking-tight break-keep">
                            ${group.name}
                        </h2>
                    </div>
                    <div class="text-5xl font-black text-slate-800 tabular-nums flex-1 text-center">
                        ${group.score}
                    </div>
                    <div class="flex flex-col gap-0.5 w-28 h-full justify-center">
                        <div class="grid grid-cols-2 gap-1">
                            <button onclick="changeScore(${group.id}, 2)" class="btn-touch bg-yellow-400 text-white text-2xl font-extrabold py-2 rounded-lg transition shadow-sm">+2</button>
                            <button onclick="changeScore(${group.id}, 3)" class="btn-touch bg-yellow-400 text-white text-2xl font-extrabold py-2 rounded-lg transition shadow-sm">+3</button>
                        </div>
                        <div class="grid grid-cols-2 gap-1">
                            <button onclick="changeScore(${group.id}, 1)" class="btn-touch bg-emerald-500 text-white text-2xl font-extrabold py-2 rounded-lg transition shadow-sm">+1</button>
                            <button onclick="changeScore(${group.id}, -1)" class="btn-touch bg-rose-500 text-white text-2xl font-extrabold py-2 rounded-lg transition shadow-sm">-1</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = async () => {
            // 先讀本地備份
            const saved = localStorage.getItem('classroom_scores_final_v7');
            if (saved) {
                groups = JSON.parse(saved);
                render();
            }
            // 嘗試自動獲取一次雲端數據
            manualSync(); 
        };
    </script>
</body>
</html>
