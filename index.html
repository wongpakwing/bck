<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課室計分系統 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; 
            background: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 拉鋸戰發光特效 */
        .tug-of-war-active {
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.4) !important;
        }

        .shard-btn {
            font-size: 14px; /* 稍微縮小字體 */
            filter: grayscale(1);
            opacity: 0.2;
            transition: all 0.3s;
            cursor: pointer;
            width: 22px; /* 從 24px 縮小到 22px */
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shard-btn.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.2);
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
        }

        /* 列表排序動畫 */
        #regular-zone {
            display: grid;
            gap: 12px;
            position: relative;
        }
        .group-item {
            transition: transform 0.5s ease-in-out, opacity 0.5s;
        }

        /* 滾動條美化 */
        #regular-zone-container::-webkit-scrollbar { width: 4px; }
        #regular-zone-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .dice-cube {
            perspective: 1000px;
            width: 60px; height: 60px;
            background: white;
            border: 3px solid #1e293b;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900;
            box-shadow: 4px 4px 0px #1e293b;
        }
    </style>
</head>
<body class="p-3">

    <header class="flex justify-between items-center mb-3">
        <div class="flex gap-2">
            <div class="bg-white rounded-2xl p-1 shadow-sm border border-slate-200 flex gap-1">
                <button onclick="openSettings('students')" class="hover:bg-slate-50 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 transition-all active:scale-90">👤 學生</button>
                <button onclick="openSettings('events')" class="hover:bg-slate-50 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 transition-all active:scale-90">🎁 獎勵</button>
                <button onclick="openSettings('shards')" class="hover:bg-slate-50 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 transition-all active:scale-90">🧩 碎片</button>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="syncIndicator" class="flex items-center gap-1.5 px-3 py-1.5 bg-white rounded-full border border-slate-200 shadow-sm">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-500 tracking-tight">雲端同步中</span>
            </div>
            <button onclick="addScoreToAll(1)" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black shadow-lg shadow-emerald-200 transition-all active:scale-95">全體 +1</button>
            <button onclick="resetData()" class="bg-slate-800 text-slate-400 hover:text-white px-5 py-2 rounded-xl text-xs font-black transition-all active:scale-95">重置</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col gap-3 overflow-hidden">
        
        <div id="special-zone" class="bg-slate-900 rounded-3xl p-5 shadow-2xl relative overflow-hidden transition-all duration-500 min-h-[160px]">
            <!-- JS 動態注入內容 -->
        </div>

        <div id="regular-zone-container" class="flex-grow overflow-y-auto px-1">
            <div id="regular-zone">
                <!-- JS 動態注入組別卡片 -->
            </div>
        </div>

    </main>

    <footer class="mt-3 flex gap-3 h-20">
        <!-- 計時器 -->
        <div class="bg-white rounded-3xl p-2 shadow-xl border border-slate-200 flex flex-col items-center justify-center w-48 shrink-0">
            <div id="timerDisplay" class="text-3xl font-black font-['JetBrains_Mono'] text-slate-800 leading-none mb-2 tracking-tighter">00:00</div>
            <div class="grid grid-cols-4 gap-1.5 w-full px-1">
                <button onclick="addTimer(10)" class="bg-slate-50 text-slate-500 py-1.5 rounded-lg text-[9px] font-bold border border-slate-100 hover:bg-slate-100">+10s</button>
                <button onclick="addTimer(60)" class="bg-slate-50 text-slate-500 py-1.5 rounded-lg text-[9px] font-bold border border-slate-100 hover:bg-slate-100">+1m</button>
                <button id="timerToggle" onclick="toggleTimer()" class="bg-blue-600 text-white py-1.5 rounded-lg text-[9px] font-bold shadow-md shadow-blue-200">開始</button>
                <button onclick="clearTimer()" class="bg-rose-50 text-rose-500 py-1.5 rounded-lg text-[9px] font-bold border border-rose-100">清零</button>
            </div>
        </div>

        <!-- 快速功能按鈕 -->
        <div class="flex-grow grid grid-cols-4 gap-3">
            <button onclick="startPick('student')" class="glass-card rounded-3xl flex flex-col items-center justify-center border-b-4 border-amber-400 hover:translate-y-[-2px] transition-all active:scale-95 shadow-lg">
                <span class="text-2xl mb-1">👤</span><span class="text-[11px] font-black text-amber-600">隨機抽人</span>
            </button>
            <button onclick="startPick('event')" class="glass-card rounded-3xl flex flex-col items-center justify-center border-b-4 border-purple-400 hover:translate-y-[-2px] transition-all active:scale-95 shadow-lg">
                <span class="text-2xl mb-1">🎁</span><span class="text-[11px] font-black text-purple-600">隨機獎勵</span>
            </button>
            <button onclick="startPick('shard')" class="glass-card rounded-3xl flex flex-col items-center justify-center border-b-4 border-sky-400 hover:translate-y-[-2px] transition-all active:scale-95 shadow-lg">
                <span class="text-2xl mb-1">🧩</span><span class="text-[11px] font-black text-sky-600">隨機碎片</span>
            </button>
            <button onclick="openDiceModal()" class="bg-rose-500 rounded-3xl flex flex-col items-center justify-center hover:translate-y-[-2px] transition-all active:scale-95 shadow-xl shadow-rose-200 border-b-4 border-rose-700">
                <span class="text-2xl mb-1">🎲</span><span class="text-[11px] font-black text-white">幸運骰子</span>
            </button>
        </div>
    </footer>

    <!-- 骰子彈窗 -->
    <div id="diceModal" class="hidden fixed inset-0 bg-slate-900/80 z-[100] backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-sm text-center shadow-2xl scale-up">
            <div id="diceArea" class="flex flex-wrap justify-center gap-4 min-h-[140px] items-center mb-8"></div>
            <div id="diceTotalDisplay" class="mb-6 invisible">
                <span class="text-slate-400 font-bold mr-2 uppercase tracking-widest text-xs">總點數</span>
                <span id="diceTotalVal" class="text-6xl font-black text-rose-500 italic">0</span>
            </div>
            <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100 mb-8 flex items-center justify-between">
                <span class="text-slate-500 font-black text-sm">骰子數量</span>
                <div class="flex items-center gap-4">
                    <button onclick="changeDiceCount(-1)" class="w-12 h-12 bg-white rounded-2xl shadow-sm text-xl font-black border border-slate-200 active:scale-90">-</button>
                    <span id="diceNumText" class="text-3xl font-black w-8">1</span>
                    <button onclick="changeDiceCount(1)" class="w-12 h-12 bg-white rounded-2xl shadow-sm text-xl font-black border border-slate-200 active:scale-90">+</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button id="rollBtn" onclick="rollDices()" class="bg-rose-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-rose-200 active:scale-95">再擲一次</button>
                <button onclick="closeModal('diceModal')" class="bg-slate-900 text-white py-5 rounded-2xl font-black text-lg active:scale-95">確認</button>
            </div>
        </div>
    </div>

    <!-- 設置彈窗 -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-slate-900/60 z-[110] backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 id="settingsTitle" class="text-xl font-black text-slate-800">編輯列表</h3>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">每行一個項目</span>
            </div>
            <textarea id="settingsInput" class="w-full h-64 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-sm mb-6 outline-none focus:border-blue-500 transition-all" spellcheck="false"></textarea>
            <div class="flex gap-3">
                <button onclick="closeModal('settingsModal')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold text-slate-400 active:scale-95">取消</button>
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95">確認儲存</button>
            </div>
        </div>
    </div>

    <!-- 隨機抽籤結果彈窗 -->
    <div id="pickModal" class="hidden fixed inset-0 bg-slate-900/90 z-[120] backdrop-blur-lg flex items-center justify-center p-6">
        <div class="bg-white rounded-[50px] p-12 w-full max-w-xs text-center border-8 border-amber-400 shadow-2xl">
            <div id="pickResult" class="text-5xl font-black text-slate-800 leading-tight min-h-[120px] flex items-center justify-center">...</div>
            <button onclick="closeModal('pickModal')" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black mt-10 shadow-xl shadow-slate-300 active:scale-95">收下獎勵</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/085cbfd3a843d7d7df1a';
        const SHARD_EMOJIS = ["❤️", "🧡", "💛", "💚", "💙", "💜"];
        const DEFAULT_STATE = {
            specialGroups: [
                { id: 'A', name: '學霸聯盟', score: 0, shards: Array(6).fill(false), shield: false }, 
                { id: 'B', name: '壞蛋聯盟', score: 0, shards: Array(6).fill(false), shield: false }
            ],
            regularGroups: Array.from({length:6}, (_,i)=>({ id: i+1, name: `第 ${i+1} 組`, score: 0, shards: Array(6).fill(false), shield: false })),
            students: ["學生A", "學生B", "學生C"],
            events: ["好表現 +1", "認真聽講 +1", "主動回答 +2", "幫助同學 +3"],
            shards: ["紅心碎片", "橙心碎片", "黃心碎片", "綠心碎片", "藍心碎片", "紫心碎片"]
        };

        let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        let tugOfWarActive = false;

        // 音效系統
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type = 'sine', duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                if (res.ok) {
                    const data = await res.json();
                    if (data) {
                        // 強制修復：如果載入的數據碎片少於 6 個，則補足
                        const fixShards = (groups) => {
                            groups.forEach(g => {
                                if (!g.shards || g.shards.length < 6) {
                                    const current = g.shards || [];
                                    g.shards = [...current, ...Array(6 - current.length).fill(false)];
                                }
                            });
                        };
                        
                        if (data.specialGroups) fixShards(data.specialGroups);
                        if (data.regularGroups) fixShards(data.regularGroups);
                        if (data.shards && data.shards.length < 6) {
                            data.shards = [...data.shards, ...DEFAULT_STATE.shards.slice(data.shards.length)];
                        }

                        state = { ...DEFAULT_STATE, ...data };
                    }
                }
            } catch (e) {
                console.error("載入失敗:", e);
            }
            render();
        }

        async function saveData() {
            try {
                await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
            } catch (e) {}
        }

        function render() {
            const sA = state.specialGroups[0], sB = state.specialGroups[1];
            tugOfWarActive = (sA.score >= 30 && sB.score >= 30 && sA.score === sB.score);

            const total = sA.score + sB.score;
            const leftW = total > 0 ? (sA.score / total) * 100 : 50;
            const sZone = document.getElementById('special-zone');
            
            if (tugOfWarActive) sZone.classList.add('tug-of-war-active');
            else sZone.classList.remove('tug-of-war-active');

            sZone.innerHTML = `
                <div class="flex justify-between items-start relative z-10 gap-1">
                    <div class="flex flex-col gap-1 flex-1 min-w-0">
                        <div class="flex items-center gap-1" onclick="editName('special','A')">
                            <span class="text-[11px] font-black text-rose-500 uppercase tracking-tighter truncate">${sA.name}</span>
                            ${sA.shield ? '🛡️' : ''}
                        </div>
                        <div class="flex gap-[2px] flex-nowrap overflow-x-visible">${sA.shards.map((s,i)=>`<div onclick="toggleShard('special','A',${i})" class="shard-btn ${s?'active':''}" title="${state.shards[i] || ''}">${SHARD_EMOJIS[i]}</div>`).join('')}</div>
                        <div class="flex gap-1 mt-2">
                            <button onclick="addSpecialScore('A',1)" class="flex-1 h-9 rounded-xl bg-rose-500 text-white font-black text-xs shadow-lg shadow-rose-900/40 active:scale-90">+1</button>
                            <button onclick="addSpecialScore('A',2)" class="flex-1 h-9 rounded-xl bg-rose-600 text-white font-black text-xs shadow-lg shadow-rose-900/40 active:scale-90">+2</button>
                            <button onclick="addSpecialScore('A',-1)" class="w-8 h-9 rounded-xl bg-slate-800 text-slate-500 font-black text-xs active:scale-90">-1</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-1 px-1 pt-4 shrink-0">
                        <span class="text-4xl font-black text-rose-500 italic drop-shadow-lg" id="score-A">${sA.score}</span>
                        <div class="h-6 w-px bg-slate-700 opacity-50 mx-1"></div>
                        <span class="text-4xl font-black text-blue-500 italic drop-shadow-lg" id="score-B">${sB.score}</span>
                    </div>

                    <div class="flex flex-col gap-1 flex-1 items-end text-right min-w-0">
                        <div class="flex items-center gap-1" onclick="editName('special','B')">
                            ${sB.shield ? '🛡️' : ''}
                            <span class="text-[11px] font-black text-blue-500 uppercase tracking-tighter truncate">${sB.name}</span>
                        </div>
                        <div class="flex gap-[2px] flex-nowrap justify-end overflow-x-visible">${sB.shards.map((s,i)=>`<div onclick="toggleShard('special','B',${i})" class="shard-btn ${s?'active':''}" title="${state.shards[i] || ''}">${SHARD_EMOJIS[i]}</div>`).join('')}</div>
                        <div class="flex gap-1 mt-2 w-full justify-end">
                            <button onclick="addSpecialScore('B',-1)" class="w-8 h-9 rounded-xl bg-slate-800 text-slate-500 font-black text-xs active:scale-90">-1</button>
                            <button onclick="addSpecialScore('B',2)" class="flex-1 h-9 rounded-xl bg-blue-600 text-white font-black text-xs shadow-lg shadow-blue-900/40 active:scale-90">+2</button>
                            <button onclick="addSpecialScore('B',1)" class="flex-1 h-9 rounded-xl bg-blue-500 text-white font-black text-xs shadow-lg shadow-blue-900/40 active:scale-90">+1</button>
                        </div>
                    </div>
                </div>

                <div class="mt-6 relative h-4 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                    <div class="absolute left-0 h-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-700" style="width: ${leftW}%"></div>
                    <div class="absolute right-0 h-full bg-gradient-to-l from-blue-600 to-blue-400 transition-all duration-700" style="width: ${100-leftW}%"></div>
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em]">${tugOfWarActive ? '!!! 鬥志激盪中 !!!' : '勢均力敵'}</span>
                    </div>
                </div>
            `;

            const sortedGroups = [...state.regularGroups].sort((a, b) => b.score - a.score);
            const rZone = document.getElementById('regular-zone');
            
            rZone.innerHTML = sortedGroups.map((g, index) => `
                <div class="group-item glass-card rounded-2xl p-2.5 flex items-center justify-between shadow-md border-l-4 ${index < 3 ? 'border-amber-400' : 'border-slate-200'}">
                    <!-- 左側資訊 -->
                    <div class="flex items-center gap-2 shrink-0 max-w-[50%]">
                        <div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center font-black text-[10px] text-slate-400 shrink-0">#${index + 1}</div>
                        <div class="flex flex-col min-w-0">
                            <span class="text-[13px] font-black text-slate-800 mb-0.5 truncate" onclick="editName('regular',${g.id})">${g.name}</span>
                            <div class="flex gap-[1px] flex-nowrap items-center">
                                ${g.shards.map((s,si)=>`<div onclick="toggleShard('regular',${g.id},${si})" class="shard-btn ${s?'active':''}" style="width:18px; height:18px; font-size:11px;">${SHARD_EMOJIS[si]}</div>`).join('')}
                                <span onclick="toggleShield('regular',${g.id})" class="ml-1 cursor-pointer text-xs ${g.shield?'opacity-100':'opacity-20'} grayscale-${g.shield?0:1}">🛡️</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 中間分數 -->
                    <div class="flex-grow text-center">
                        <span class="text-4xl font-black text-slate-800 tracking-tighter score-pop italic cursor-pointer" onclick="modifyScore('regular',${g.id})">${g.score}</span>
                    </div>
                    
                    <!-- 右側按鈕 -->
                    <div class="flex gap-1.5 shrink-0">
                        <button onclick="addScore('regular',${g.id},1)" class="w-11 h-11 rounded-xl bg-emerald-500 text-white font-black shadow-lg shadow-emerald-100 active:scale-90 text-sm">+1</button>
                        <button onclick="addScore('regular',${g.id},2)" class="w-11 h-11 rounded-xl bg-emerald-600 text-white font-black shadow-lg shadow-emerald-100 active:scale-90 text-sm">+2</button>
                        <button onclick="addScore('regular',${g.id},-1)" class="w-9 h-11 rounded-xl bg-slate-50 text-slate-300 font-black border border-slate-100 active:scale-90 text-xs">-1</button>
                    </div>
                </div>
            `).join('');
        }

        function addSpecialScore(target, val) {
            const sA = state.specialGroups[0], sB = state.specialGroups[1];
            if (val > 0) playNote(440 + val * 100, 'triangle'); else playNote(220, 'square');
            
            if (target === 'A') {
                sA.score += val;
                if (tugOfWarActive && val > 0) sB.score = Math.max(0, sB.score - val);
            } else {
                sB.score += val;
                if (tugOfWarActive && val > 0) sA.score = Math.max(0, sA.score - val);
            }
            render(); saveData();
        }

        function addScore(type, id, val) {
            const grp = state.regularGroups.find(g => g.id == id);
            if (val > 0) playNote(523.25 + val * 50); else playNote(196);
            if (grp) { grp.score = Math.max(0, grp.score + val); render(); saveData(); }
        }

        // 骰子邏輯
        let diceCount = 1;
        function openDiceModal() { document.getElementById('diceModal').classList.remove('hidden'); rollDices(); }
        function changeDiceCount(v) { diceCount = Math.max(1, Math.min(6, diceCount + v)); document.getElementById('diceNumText').innerText = diceCount; playNote(880, 'sine', 0.05); }
        function rollDices() {
            const area = document.getElementById('diceArea');
            const totalVal = document.getElementById('diceTotalVal');
            const totalDisplay = document.getElementById('diceTotalDisplay');
            const btn = document.getElementById('rollBtn');
            btn.disabled = true;
            area.innerHTML = Array(diceCount).fill(0).map(() => `<div class="dice-cube animate-bounce">?</div>`).join('');
            totalDisplay.classList.add('invisible');
            
            let ticks = 0;
            const timer = setInterval(() => {
                const results = Array(diceCount).fill(0).map(() => Math.floor(Math.random() * 6) + 1);
                area.innerHTML = results.map(r => `<div class="dice-cube">${r}</div>`).join('');
                playNote(200 + Math.random() * 400, 'square', 0.02);
                if (ticks++ > 15) {
                    clearInterval(timer); btn.disabled = false;
                    const sum = results.reduce((a,b)=>a+b, 0);
                    totalVal.innerText = sum; totalDisplay.classList.remove('invisible');
                    confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 } });
                    playNote(659, 'triangle', 0.3);
                }
            }, 60);
        }

        // 計時器邏輯
        let tSec = 0, tInt = null;
        function updateT() { document.getElementById('timerDisplay').innerText = `${Math.floor(tSec/60).toString().padStart(2,'0')}:${(tSec%60).toString().padStart(2,'0')}`; }
        function addTimer(s) { tSec += s; updateT(); playNote(1000, 'sine', 0.05); }
        function clearTimer() { tSec = 0; if(tInt) toggleTimer(); updateT(); }
        function toggleTimer() {
            const btn = document.getElementById('timerToggle');
            if (tInt) { clearInterval(tInt); tInt = null; btn.innerText = "開始"; btn.className = "bg-blue-600 text-white py-1.5 rounded-lg text-[9px] font-bold"; }
            else if (tSec > 0) {
                btn.innerText = "暫停"; btn.className = "bg-amber-500 text-white py-1.5 rounded-lg text-[9px] font-bold";
                tInt = setInterval(() => { 
                    if (tSec > 0) { 
                        tSec--; updateT(); 
                        if (tSec <= 5) playNote(880, 'sine', 0.05);
                    } 
                    else { 
                        clearInterval(tInt); tInt = null; btn.innerText = "開始"; btn.className = "bg-blue-600 text-white py-1.5 rounded-lg text-[9px] font-bold"; 
                        confetti(); playNote(523, 'triangle', 0.5);
                    }
                }, 1000);
            }
        }

        // 其他功能
        function toggleShard(type, id, i) {
            const grp = type==='special'? state.specialGroups.find(g=>g.id===id) : state.regularGroups.find(g=>g.id==id);
            grp.shards[i] = !grp.shards[i]; playNote(1200, 'sine', 0.1); render(); saveData();
        }
        function toggleShield(type, id) {
            const grp = type==='special'? state.specialGroups.find(g=>g.id===id) : state.regularGroups.find(g=>g.id==id);
            grp.shield = !grp.shield; playNote(800, 'sine', 0.1); render(); saveData();
        }
        function addScoreToAll(v) { state.regularGroups.forEach(g => g.score += v); playNote(700, 'triangle', 0.2); render(); saveData(); }
        function resetData() { if(confirm("確定重置全體分數？")){ state = JSON.parse(JSON.stringify(DEFAULT_STATE)); render(); saveData(); } }
        
        function editName(type, id) { 
            const grp = type==='special'? state.specialGroups.find(g=>g.id===id) : state.regularGroups.find(g=>g.id==id);
            const n = prompt("修改組別名稱", grp.name); if(n) { grp.name = n; render(); saveData(); }
        }
        
        function modifyScore(type, id) {
            const grp = type==='special'? state.specialGroups.find(g=>g.id===id) : state.regularGroups.find(g=>g.id==id);
            const n = prompt("手動調整分數", grp.score); if(n !== null) { grp.score = parseInt(n) || 0; render(); saveData(); }
        }

        let activeMode = '';
        function openSettings(m) {
            activeMode = m;
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('settingsTitle').innerText = m==='students'?'編輯學生名單':(m==='events'?'編輯隨機獎勵':'編輯碎片名稱');
            document.getElementById('settingsInput').value = (state[m] || []).join('\n');
        }
        function saveSettings() {
            state[activeMode] = document.getElementById('settingsInput').value.split('\n').filter(l => l.trim());
            closeModal('settingsModal'); saveData();
        }

        function startPick(mode) {
            const list = mode==='student'? state.students : (mode==='event'? state.events : state.shards);
            if (!list || !list.length) { alert("列表為空，請先編輯！"); return; }
            document.getElementById('pickModal').classList.remove('hidden');
            let i = 0;
            const timer = setInterval(() => {
                document.getElementById('pickResult').innerText = list[Math.floor(Math.random() * list.length)];
                playNote(800 + Math.random() * 200, 'sine', 0.02);
                if (i++ > 15) { 
                    clearInterval(timer); 
                    confetti({ spread: 100, origin: { y: 0.6 }, colors: ['#fbbf24', '#f59e0b'] }); 
                    playNote(1000, 'triangle', 0.2);
                }
            }, 80);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        // 初始加載
        window.onload = loadData;
    </script>
</body>
</html>
